<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Adicionar — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:100%;margin:0 auto;min-height:100dvh;padding:0 clamp(12px,3vw,40px)}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:clamp(80px,10vw,120px) auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}
.header{display:flex;align-items:center;gap:clamp(8px,2vw,12px);padding:6px 0 14px}
.header .back{width:clamp(36px,5vw,40px);height:clamp(36px,5vw,40px);border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:clamp(18px,2.5vw,20px);font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}
.form-wrap{flex:1;overflow-y:auto;padding:0 0 16px;display:flex;flex-direction:column;gap:clamp(6px,1.5vw,8px);max-width:800px;margin:0 auto;width:100%}

.form-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px clamp(14px,2vw,16px) clamp(12px,2vw,14px)}
.form-group label{display:block;font-size:clamp(11px,1.3vw,12px);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding:0 2px}

.form-group select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:clamp(6px,1.5vw,8px)}
.form-row .form-group{margin-bottom:0}

.checkbox-group{display:flex;flex-direction:column;gap:clamp(8px,1.5vw,10px);padding:4px 2px}
.checkbox-row{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:clamp(14px,1.8vw,15px);font-weight:500}
.checkbox-row input[type="checkbox"]{width:clamp(18px,2.5vw,20px);height:clamp(18px,2.5vw,20px);accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin:0}

.form-group{position:relative}
.input-wrap{position:relative;display:flex;align-items:center}
.input-wrap input,.input-wrap select,.input-wrap textarea{padding-right:42px}
.field-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:clamp(18px,2.5vw,20px);height:clamp(18px,2.5vw,20px);color:var(--muted);opacity:.5;pointer-events:none}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:clamp(10px,1.5vw,12px) clamp(12px,2vw,14px);border:1.5px solid var(--border);border-radius:10px;font-size:clamp(14px,1.8vw,16px);font-family:var(--font-body);background:var(--surface);color:var(--fg);outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
.form-group textarea{resize:none;font-size:clamp(14px,1.8vw,15px);line-height:1.5}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#b0b0b0}
.submit-btn{width:100%;padding:clamp(14px,2vw,16px);border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:clamp(15px,2vw,17px);font-weight:700;font-family:var(--font-display);cursor:pointer;transition:all .2s;margin-top:6px}
.submit-btn:active{transform:scale(.97);opacity:.9}

.type-selector{display:flex;gap:clamp(6px,1.5vw,8px);margin-bottom:4px}
.type-btn{flex:1;padding:clamp(8px,1.5vw,10px);border:1.5px solid var(--border);border-radius:10px;background:var(--surface);text-align:center;font-size:clamp(13px,1.6vw,14px);font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-body);color:var(--muted)}
.type-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 0 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:clamp(10px,1.2vw,10px);font-weight:500;background:none;border:none;font-family:var(--font-body)}
.nav-item svg{width:clamp(20px,3vw,24px);height:clamp(20px,3vw,24px)}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Cadastro</h1>
</div>

<div class="form-wrap">
  <div class="form-group">
    <label>Tipo</label>
    <div class="type-selector">
      <div class="type-btn active">Médium</div>
      <div class="type-btn">Frequentador</div>

    </div>
  </div>

  <div class="form-group">
    <label>Nome completo</label>
    <div class="input-wrap">
      <input type="text" id="cadNome" placeholder="Ex: Maria da Silva">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </div>

  <div class="form-group">
    <label>Telefone / WhatsApp</label>
    <div class="input-wrap">
      <input type="tel" id="cadTel" placeholder="(11) 99999-9999">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </div>
  </div>

  <div class="form-group">
    <label>Endereço</label>
    <div class="input-wrap">
      <input type="text" id="cadEndereco" placeholder="Rua, número, bairro">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>E-mail (opcional)</label>
      <input type="email" id="cadEmail" placeholder="email@exemplo.com">
    </div>
    <div class="form-group">
      <label>Data de nasc.</label>
      <input type="date" id="cadNasc">
    </div>
  </div>

  <div class="form-group">
    <label>Observações</label>
    <textarea id="cadObs" rows="3" placeholder="Anotações sobre a pessoa..."></textarea>
  </div>

  <button class="submit-btn">Salvar Cadastro</button>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});
document.querySelector('.submit-btn').addEventListener('click', async function(e){
  e.preventDefault();
  const nome = document.getElementById('cadNome').value.trim();
  if (!nome) { this.textContent = 'Preencha o nome!'; this.style.background = '#e74c3c'; setTimeout(() => { this.textContent = 'Salvar Cadastro'; this.style.background = 'var(--accent)'; }, 1500); return; }
  const tipo = document.querySelector('.type-btn.active').textContent;
  const tel = document.getElementById('cadTel').value.trim();
  const endereco = document.getElementById('cadEndereco').value.trim();
  const email = document.getElementById('cadEmail').value.trim();
  const nasc = document.getElementById('cadNasc').value;
  const obs = document.getElementById('cadObs').value.trim();
  try {
    const res = await fetch(`${API}/mediuns`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome, tipo, tel, endereco, email, nasc, obs }) });
    if (res.ok) {
      this.textContent = 'Cadastrado ✓';
      this.style.background = 'var(--accent)';
      this.style.opacity = '.7';
      setTimeout(() => { location.replace('mediuns.html'); }, 400);
    } else {
      this.textContent = 'Erro ao cadastrar!'; this.style.background = '#e74c3c';
      setTimeout(() => { this.textContent = 'Salvar Cadastro'; this.style.background = 'var(--accent)'; }, 1500);
    }
  } catch(err) {
    this.textContent = 'Erro de conexão!'; this.style.background = '#e74c3c';
    setTimeout(() => { this.textContent = 'Salvar Cadastro'; this.style.background = 'var(--accent)'; }, 1500);
  }
});
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}
</script>
</body>
</html>
