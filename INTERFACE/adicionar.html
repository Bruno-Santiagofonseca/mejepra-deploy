<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<meta name="theme-color" content="#0A1E3F" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Centro360">
<link rel="manifest" href="/manifest.json">
<title>Cadastro — Centro360</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(97% 0.01 262);
  --surface:oklch(100% 0 0);
  --fg:oklch(35% 0.06 262);
  --muted:oklch(50% 0.035 262);
  --border:oklch(88% 0.025 262);
  --accent:oklch(58% 0.14 190);
  --accent-light:oklch(88% 0.08 190);
  --gold:oklch(75% 0.14 85);
  --gold-light:oklch(92% 0.08 85);
  --radius:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:oklch(18% 0.015 262);
    --surface:oklch(23% 0.02 262);
    --fg:oklch(88% 0.01 262);
    --muted:oklch(60% 0.02 262);
    --border:oklch(30% 0.02 262);
    --accent:oklch(65% 0.14 190);
    --accent-light:oklch(30% 0.06 190);
    --gold:oklch(80% 0.14 85);
    --gold-light:oklch(35% 0.08 85)
  }
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:100%;margin:0 auto;min-height:100dvh;padding:0 16px}
@media(min-width:480px){body{padding:0 24px}}

.header{display:flex;align-items:center;gap:10px;padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.header .back{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .15s;color:var(--fg);flex-shrink:0}
.header .back:hover{background:var(--accent-light);border-color:var(--accent)}
.header .back:active{transform:scale(.93)}
.header h1{font-size:1.25rem;font-weight:700;letter-spacing:-0.3px;color:var(--fg)}

.form-wrap{flex:1;overflow-y:auto;padding:0 0 24px;display:flex;flex-direction:column;gap:10px;max-width:600px;margin:0 auto;width:100%}

.type-selector{display:flex;gap:8px}
.type-btn{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);text-align:center;font-size:.875rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s,border .15s;color:var(--muted);font-family:var(--font)}
.type-btn:hover{border-color:var(--accent);color:var(--fg)}
.type-btn:active{transform:scale(.97)}
.type-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.type-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.form-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px 14px}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}

.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:1rem;font-family:var(--font);background:var(--surface);color:var(--fg);outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
.form-group textarea{resize:none;font-size:.9375rem;line-height:1.5;min-height:70px}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input:hover,.form-group textarea:hover{border-color:var(--muted)}

.input-wrap{position:relative;display:flex;align-items:center}
.input-wrap input{padding-right:40px}
.field-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:1.25rem;height:1.25rem;color:var(--muted);opacity:.5;pointer-events:none}

.form-row{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:480px){.form-row{grid-template-columns:1fr 1fr}}

.field-error input,.field-error textarea{border-color:var(--gold)!important}
.field-error .error-msg{color:var(--gold);font-size:.75rem;margin-top:4px;font-weight:500}

.submit-btn{width:100%;padding:14px 16px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:1.0625rem;font-weight:700;cursor:pointer;transition:opacity .15s,transform .15s;margin-top:4px}
.submit-btn:hover{opacity:.9;transform:scale(1.01)}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.submit-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.toast-container{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:calc(100vw - 32px);width:400px}
.toast{padding:10px 16px;border-radius:10px;font-size:.875rem;font-weight:500;pointer-events:auto;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease}
.toast-success{background:var(--accent);color:#fff}
.toast-info{background:var(--fg);color:#fff}
.toast-error{background:var(--gold);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
<script src="/auth-helper.js"></script>
</head>
<body>

<div class="header" role="banner">
  <button class="back" onclick="location.replace('mediuns.html')" type="button" aria-label="Voltar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Cadastro</h1>
</div>

<div class="form-wrap">
  <div class="type-selector" role="radiogroup" aria-label="Tipo de cadastro">
    <button class="type-btn active" data-tipo="Médium" onclick="selecionarTipo(this)" type="button" role="radio" aria-checked="true">Médium</button>
    <button class="type-btn" data-tipo="Frequentador" onclick="selecionarTipo(this)" type="button" role="radio" aria-checked="false">Frequentador</button>
  </div>

  <div class="form-group" id="fieldNome">
    <label for="cadNome">Nome completo</label>
    <div class="input-wrap">
      <input type="text" id="cadNome" placeholder="Ex: Maria da Silva" autocomplete="name">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div class="error-msg"></div>
  </div>

  <div class="form-group">
    <label for="cadTel">Telefone / WhatsApp</label>
    <div class="input-wrap">
      <input type="tel" id="cadTel" placeholder="(11) 99999-9999" autocomplete="tel">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </div>
  </div>

  <div class="form-group">
    <label for="cadEndereco">Endereço</label>
    <div class="input-wrap">
      <input type="text" id="cadEndereco" placeholder="Rua, número, bairro" autocomplete="street-address">
      <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="cadEmail">E-mail <span style="font-weight:400;text-transform:none;color:var(--muted)">(opcional)</span></label>
      <input type="email" id="cadEmail" placeholder="email@exemplo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="cadNasc">Data de nasc.</label>
      <input type="date" id="cadNasc">
    </div>
  </div>

  <div class="form-group">
    <label for="cadObs">Observações</label>
    <textarea id="cadObs" rows="3" placeholder="Anotações sobre a pessoa..."></textarea>
  </div>

  <button class="submit-btn" id="btnSalvar" onclick="salvarCadastro()" type="button">Salvar Cadastro</button>
</div>

<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script>
var API = '/api';
var tipoAtual = "Médium";

function selecionarTipo(el) {
  document.querySelectorAll('.type-btn').forEach(function(b) {
    b.classList.remove('active');
    b.setAttribute('aria-checked', 'false');
  });
  el.classList.add('active');
  el.setAttribute('aria-checked', 'true');
  tipoAtual = el.dataset.tipo;
}

function mostrarToast(msg, tipo) {
  tipo = tipo || 'info';
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast toast-' + tipo;
  el.textContent = msg;
  el.setAttribute('role', 'status');
  container.appendChild(el);
  setTimeout(function() {
    el.style.animation = 'toastOut .3s ease forwards';
    setTimeout(function() { el.remove(); }, 300);
  }, 3000);
}

function validarForm() {
  document.querySelectorAll('.field-error').forEach(function(f) { f.classList.remove('field-error'); });
  document.querySelectorAll('.error-msg').forEach(function(e) { e.textContent = ''; });
  var valido = true;
  var nome = document.getElementById('cadNome').value.trim();
  if (!nome) {
    document.getElementById('fieldNome').classList.add('field-error');
    document.getElementById('fieldNome').querySelector('.error-msg').textContent = 'Preencha o nome completo.';
    valido = false;
  }
  return valido;
}

async function salvarCadastro() {
  if (!validarForm()) return;
  var btn = document.getElementById('btnSalvar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  var nome = document.getElementById('cadNome').value.trim();
  var tel = document.getElementById('cadTel').value.trim();
  var endereco = document.getElementById('cadEndereco').value.trim();
  var email = document.getElementById('cadEmail').value.trim();
  var nasc = document.getElementById('cadNasc').value;
  var obs = document.getElementById('cadObs').value.trim();
  try {
    var r = await fetch(API + '/mediuns', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: nome,
        tipo: tipoAtual,
        tel: tel,
        endereco: endereco,
        email: email,
        nasc: nasc,
        obs: obs
      })
    });
    if (r.ok) {
      mostrarToast('Cadastrado com sucesso!', 'success');
      setTimeout(function() { location.replace('mediuns.html'); }, 500);
    } else {
      var err = await r.json();
      mostrarToast(err.error || 'Erro ao cadastrar.', 'error');
      btn.disabled = false;
      btn.textContent = 'Salvar Cadastro';
    }
  } catch(err) {
    mostrarToast('Erro de conexão.', 'error');
    btn.disabled = false;
    btn.textContent = 'Salvar Cadastro';
  }
}
</script>
<script>
/* Service worker cleanup — garante versão fresca do servidor */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
  if ('caches' in window) {
    caches.keys().then(function(keys) {
      keys.forEach(function(k) {
        if (k.startsWith('centro360-')) caches.delete(k);
      });
    });
  }
}
</script>
</body>
</html>
