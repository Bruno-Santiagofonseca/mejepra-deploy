<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Faxina — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:120px auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}

.status-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 8px;font-size:13px;font-weight:600;color:var(--fg)}
.status-bar .time{font-weight:700}
.status-icons{display:flex;align-items:center;gap:5px}

.header{display:flex;align-items:center;gap:12px;padding:6px 16px 14px}
.header .back{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:20px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}

.period-bar{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px}
.period-bar .month{font-size:17px;font-weight:700;font-family:var(--font-display)}
.period-bar .nav-arrows{display:flex;gap:4px}
.period-bar .nav-arrows button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg);transition:all .1s}
.period-bar .nav-arrows button:active{background:var(--border)}

.add-btn{padding:0 16px 12px}
.add-btn button{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-display);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.add-btn button:active{transform:scale(.97)}
.add-btn button svg{width:18px;height:18px}

.period-total{display:flex;gap:12px;padding:0 16px 14px}
.period-total .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.period-total .stat-card .label{font-size:12px;color:var(--muted);font-weight:500}
.period-total .stat-card .value{font-size:18px;font-weight:700;margin-top:4px;font-family:var(--font-display)}
.period-total .stat-card .value.ok{color:var(--accent)}
.period-total .stat-card .value.falta{color:#e74c3c}

.list{flex:1;overflow-y:auto;padding:0 16px 24px;display:flex;flex-direction:column;gap:8px}
.list-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s}
.list-item:active{background:var(--accent-light);transform:scale(.98)}
.list-item .avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:15px;flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .name{font-size:16px;font-weight:600;font-family:var(--font-display)}
.list-item .row-detail{display:flex;gap:16px;margin-top:3px;font-size:13px}
.list-item .row-detail .label{color:var(--muted)}
.list-item .row-detail .val{font-weight:700;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag.feito{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.tag.falta{background:color-mix(in srgb,#e74c3c 12%,transparent);color:#e74c3c}
.tag.nao_pago{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item svg{width:24px;height:24px}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}

/* Sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:10}
.sheet{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 32px;z-index:11;box-shadow:0 -4px 30px rgba(0,0,0,0.1)}
.sheet.open,.overlay.open{display:block}
.sheet .handle{width:36px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 16px}
.sheet h2{font-size:18px;font-weight:700;font-family:var(--font-display);margin-bottom:16px;text-align:center}
.sheet .field{margin-bottom:14px}
.sheet .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
.sheet .field input,.sheet .field select{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:var(--font-body);color:var(--fg);outline:none;transition:border .2s;background:var(--bg)}
.sheet .field input:focus,.sheet .field select:focus{border-color:var(--accent)}
.sheet select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px;-webkit-appearance:none;appearance:none}
.sheet .status-options{display:flex;gap:8px;margin-bottom:20px}
.sheet .status-options button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);color:var(--muted);transition:all .15s}
.sheet .status-options button.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.sheet .btn-salvar{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-display);transition:all .15s}
.sheet .btn-salvar:active{transform:scale(.97)}
.sheet .btn-excluir{width:100%;padding:12px;border:none;border-radius:12px;background:transparent;color:#e74c3c;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-top:8px}
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">10:28</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><rect x="12" y="3" width="3.5" height="6" rx="0.8" fill="currentColor"/><rect x="2.5" y="4" width="6" height="4" rx="0.5" fill="currentColor" opacity="0.85"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:2px"><path d="M8 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5 5c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
  </div>
</div>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Faxina</h1>
</div>

<div class="period-bar">
  <span class="month">Maio 2026</span>
  <div class="nav-arrows">
    <button onclick="navegarMes(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button onclick="navegarMes(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<div class="add-btn">
  <button onclick="abrirSheet()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
    Adicionar
  </button>
</div>

<div class="period-total" id="totalCard">
  <div class="stat-card">
    <div class="label">Total Mês</div>
    <div class="value" id="totalMes">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Concluídas</div>
    <div class="value ok" id="totalFeito">0</div>
  </div>
  <div class="stat-card">
    <div class="label">Faltas</div>
    <div class="value falta" id="totalPendente">0</div>
  </div>
</div>

<div class="list" id="listaFaxina"></div>

<div class="overlay" id="overlay" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h2 id="sheetTitle">Adicionar Faxina</h2>

  <div class="field">
    <label>Médium</label>
    <select id="inputMedium">
      <option value="">Selecione o médium</option>
    </select>
  </div>
  <div class="field">
    <label>Data da faxina</label>
    <input type="date" id="inputData">
  </div>
  <div class="field">
    <label>Valor da faxina (R$)</label>
    <input type="number" id="inputValor" placeholder="0,00" step="0.01" min="0">
  </div>

  <div class="status-options">
    <button class="selected" data-presenca="feito" onclick="selecionarPresenca(this)">Feito</button>
    <button data-presenca="falta" onclick="selecionarPresenca(this)">Falta</button>
  </div>
  <div class="status-options" style="margin-top:-4px;margin-bottom:24px">
    <button id="btnPagamento" class="selected" onclick="togglePagamento()">Pago</button>
  </div>

  <button class="btn-salvar" onclick="salvarFaxina()">Salvar</button>
  <button class="btn-excluir" id="btnExcluir" onclick="excluirFaxina()">Excluir</button>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
function getMesAno(){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  return { mes: (meses.indexOf(partes[0])+1).toString().padStart(2,'0'), ano: partes[1] };
}
let mediunsAtivos = [];
let dados = [];
let editingId = null;
let presencaAtual = "feito";
let pagamentoAtual = "pago";

async function carregarMediuns(){
  try {
    const res = await fetch(`${API}/mediuns`);
    mediunsAtivos = (await res.json()).filter(m => m.status === 'Ativo');
    const sel = document.getElementById('inputMedium');
    sel.innerHTML = '<option value="">Selecione o médium</option>';
    mediunsAtivos.forEach(m => {
      sel.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
    });
  } catch(e) { console.error('Erro:', e); }
}

async function carregarDados(){
  const mA = getMesAno();
  try {
    const res = await fetch(`${API}/faxina?mes=${mA.mes}&ano=${mA.ano}`);
    dados = await res.json();
    renderizar();
  } catch(e) { console.error('Erro:', e); dados = []; renderizar(); }
}

function renderizar(){
  const lista = document.getElementById("listaFaxina");
  lista.innerHTML = "";
  let total = 0, concluidas = 0, pendentes = 0;
  dados.sort((a, b) => (a.data || '').localeCompare(b.data || ''));
  dados.forEach(d => {
    if(d.presenca === "falta") total += d.valor;
    if(d.presenca === "feito") concluidas++;
    else pendentes++;
    const presencaLabel = {feito:"Feito",falta:"Falta"}[d.presenca];
    const pagamentoLabel = d.pagamento === "pago" ? "Pago" : "Não Pago";
    const presencaClass = d.presenca;
    const iniciais = d.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const dataFormatada = d.data ? (() => { const p = d.data.split('-'); return `${p[2]}/${p[1]}`; })() : '';
    const item = document.createElement("div");
    item.className = "list-item";
    item.onclick = () => editarFaxina(d.id);
    const detailHtml = d.presenca === "falta" ? `
      <div class="row-detail">
        <span><span class="label">Valor</span> <span class="val">R$ ${d.valor.toFixed(2)}</span></span>
        <span><span class="label">Pgto</span> <span class="val">${pagamentoLabel}</span></span>
      </div>` : '';
    item.innerHTML = `
      <div class="avatar">${iniciais}</div>
      <div class="info">
        <div class="name">${d.nome}</div>
        ${dataFormatada ? `<div class="row-detail"><span><span class="label">Data</span> <span class="val">${dataFormatada}</span></span></div>` : ''}
        ${detailHtml}
      </div>
      <span class="tag ${presencaClass}">${presencaLabel}</span>
    `;
    lista.appendChild(item);
  });
  document.getElementById("totalMes").textContent = "R$ "+total.toFixed(2);
  document.getElementById("totalFeito").textContent = concluidas;
  document.getElementById("totalPendente").textContent = pendentes;
}

function abrirSheet(dadosEdicao){
  editingId = dadosEdicao ? dadosEdicao.id : null;
  document.getElementById("sheetTitle").textContent = dadosEdicao ? "Editar Faxina" : "Adicionar Faxina";
  document.getElementById("inputMedium").value = dadosEdicao ? dadosEdicao.medium_id : "";
  document.getElementById("inputData").value = dadosEdicao ? dadosEdicao.data : "";
  document.getElementById("inputValor").value = dadosEdicao ? dadosEdicao.valor : "";
  document.getElementById("btnExcluir").style.display = dadosEdicao ? "block" : "none";
  presencaAtual = dadosEdicao ? dadosEdicao.presenca : "feito";
  pagamentoAtual = dadosEdicao ? dadosEdicao.pagamento : "pago";
  document.querySelectorAll("[data-presenca]").forEach(b => {
    b.classList.toggle("selected", b.dataset.presenca === presencaAtual);
  });
  atualizarBtnPagamento();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

function fecharSheet(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  editingId = null;
}

function selecionarPresenca(el){
  document.querySelectorAll("[data-presenca]").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  presencaAtual = el.dataset.presenca;
  if(presencaAtual === "falta") pagamentoAtual = "nao_pago";
  else pagamentoAtual = "pago";
  atualizarBtnPagamento();
}

function togglePagamento(){
  pagamentoAtual = pagamentoAtual === "pago" ? "nao_pago" : "pago";
  atualizarBtnPagamento();
}

function atualizarBtnPagamento(){
  const btn = document.getElementById("btnPagamento");
  btn.textContent = pagamentoAtual === "pago" ? "Pago" : "Não Pago";
  btn.classList.toggle("selected", pagamentoAtual === "pago");
}

async function salvarFaxina(){
  const mediumId = parseInt(document.getElementById("inputMedium").value);
  const data = document.getElementById("inputData").value;
  const valor = parseFloat(document.getElementById("inputValor").value) || 0;
  if(!mediumId){ alert("Selecione um médium."); return; }
  if(!data){ alert("Selecione a data da faxina."); return; }
  if(valor <= 0){ alert("Preencha o valor da faxina."); return; }
  const mA = getMesAno();
  const med = mediunsAtivos.find(m => m.id === mediumId);
  const body = { medium_id: mediumId, nome: med ? med.nome : '', data, valor, presenca:presencaAtual, pagamento:pagamentoAtual, mes: mA.mes, ano: mA.ano };
  try {
    if(editingId){
      await fetch(`${API}/faxina/${editingId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    } else {
      await fetch(`${API}/faxina`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }
    fecharSheet();
    carregarDados();
  } catch(e) { console.error('Erro:', e); alert('Erro ao salvar'); }
}

async function excluirFaxina(){
  if(!editingId) return;
  if(!confirm("Excluir esta faxina?")) return;
  try {
    await fetch(`${API}/faxina/${editingId}`, { method: 'DELETE' });
    fecharSheet();
    carregarDados();
  } catch(e) { console.error('Erro:', e); }
}

function editarFaxina(id){
  const d = dados.find(x => x.id === id);
  if(d) abrirSheet(d);
}

function navegarMes(dir){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  let mes = meses.indexOf(partes[0]), ano = parseInt(partes[1]);
  mes += dir;
  if(mes<0){ mes=11; ano--; } else if(mes>11){ mes=0; ano++; }
  span.textContent = meses[mes]+" "+ano;
  carregarDados();
}

carregarMediuns();
carregarDados();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}
</script>
</body>
</html>
