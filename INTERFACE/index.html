<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Mejepra — Gestão Financeira</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:16px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:120px auto;background-repeat:space;background-position:center;opacity:.045;pointer-events:none}
.grid-wrap,.logo-area,.status-bar,.bottom-nav{position:relative;z-index:1}

/* Status bar */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 8px;font-size:13px;font-weight:600;letter-spacing:0.3px;color:var(--fg)}
.status-bar .time{font-weight:700}
.status-icons{display:flex;align-items:center;gap:5px}

/* Logo */
.logo-area{display:flex;flex-direction:column;align-items:center;padding:28px 20px 12px}
.logo-img{width:170px;height:170px;object-fit:contain;display:block}
.logo-subtitle{font-size:24px;font-weight:700;margin-top:18px;color:var(--fg);font-family:var(--font-display);letter-spacing:-0.3px}
.logo-sub{font-size:14px;color:var(--muted);margin-top:4px;font-weight:400}

/* Grid */
.grid-wrap{flex:1;padding:12px 16px 20px;display:flex;flex-direction:column}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;align-content:start}

/* Card button */
.card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--surface);border-radius:var(--radius);padding:20px 12px;border:1px solid var(--border);cursor:pointer;transition:all .2s;min-height:120px;text-decoration:none;color:var(--fg);-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.96);background:color-mix(in srgb,var(--surface) 96%,var(--accent))}
.card svg{width:36px;height:36px;display:block;color:var(--accent);flex-shrink:0}
.card span{font-size:15px;font-weight:600;text-align:center;line-height:1.3;font-family:var(--font-display)}
.card .card-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:-4px}

/* Bottom nav */
.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;transition:color .2s;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:24px;height:24px}
.nav-item.active svg{color:var(--accent)}
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">10:28</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><rect x="12" y="3" width="3.5" height="6" rx="0.8" fill="currentColor"/><rect x="2.5" y="4" width="6" height="4" rx="0.5" fill="currentColor" opacity="0.85"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:2px"><path d="M8 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5 5c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
  </div>
</div>

<div class="logo-area">
  <img class="logo-img" src="logo.png" alt="Mejepra">
  <div class="logo-subtitle">Mejepra</div>
  <div class="logo-sub">Gestão Financeira</div>
</div>

<div class="grid-wrap">
  <div class="grid">

    <a class="card" href="mediuns.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.5"/><path d="M3 20c1.5-2.5 4-4 7-4s5.5 1.5 7 4"/><path d="M17 5.5a3 3 0 1 1 0 5"/><path d="M21 12c1 1.2 1.5 2.5 1.5 4"/></svg>
      <span>Médiuns</span>
    </a>

    <a class="card" href="mensalidade.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="12" cy="16" r="2"/><path d="M8 2l2 4"/><path d="M16 2l-2 4"/></svg>
      <span>Mensalidade</span>
    </a>

    <a class="card" href="faxina.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2l4 4-6 6-4-4 6-6z"/><path d="M8 12l-4 4 2 2 4-4"/><path d="M16 12l4 4-2 2-4-4"/><path d="M8 4l-4 4"/></svg>
      <span>Faxina</span>
    </a>

    <a class="card" href="despesas.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg>
      <span>Despesas</span>
    </a>

    <a class="card" href="trabalhos.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
      <span>Trabalhos</span>
    </a>

    <a class="card" href="extras.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Extras</span>
    </a>

  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}
</script>
</body>
</html>
