<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#F4F6FA" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0A1E3F" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Centro360">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="mppkpkje-icon.PNG">
<title>Centro360 — Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(96.6% 0.004 265);
  --surface:oklch(100% 0 0);
  --fg:oklch(32% 0.06 262);
  --muted:oklch(48% 0.035 260);
  --border:oklch(88% 0.005 265);
  --accent:oklch(56% 0.15 190);
  --accent-light:oklch(90% 0.06 190);
  --gold:oklch(74% 0.16 85);
  --gold-light:oklch(94% 0.06 85);
  --gold-dark:oklch(50% 0.18 25);
  --gold-dark-light:oklch(90% 0.06 25);
  --radius:16px;
  --radius-sm:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:oklch(18% 0.012 265);
    --surface:oklch(22% 0.015 265);
    --fg:oklch(88% 0.01 265);
    --muted:oklch(60% 0.015 240);
    --border:oklch(30% 0.012 265);
    --accent:oklch(65% 0.13 190);
    --accent-light:oklch(30% 0.06 190);
    --gold:oklch(74% 0.16 85);
    --gold-light:oklch(40% 0.06 85);
    --gold-dark:oklch(60% 0.2 25);
    --gold-dark-light:oklch(35% 0.1 25)
  }
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
}

/* Background shape — elemento de identidade sutil */
body::before{
  content:'';position:fixed;top:-40vh;right:-20vw;width:80vw;height:80vw;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--accent) 6%,transparent) 0%,transparent 70%);
  pointer-events:none;z-index:0
}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards}
.section-label{opacity:0;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards;animation-delay:.1s}
.nav-card{opacity:0;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards}
.nav-card:nth-child(1){animation-delay:.15s}
.nav-card:nth-child(2){animation-delay:.2s}
.nav-card:nth-child(3){animation-delay:.25s}
.nav-card:nth-child(4){animation-delay:.3s}
.nav-card:nth-child(5){animation-delay:.35s}
.nav-card:nth-child(6){animation-delay:.4s}
.backup-area{opacity:0;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards;animation-delay:.45s}

html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:720px;margin:0 auto;min-height:100dvh;padding:0 12px;position:relative}
@media(min-width:768px){body{padding:0 24px}}

.logo-wrap{display:flex;align-items:center;justify-content:center;padding:36px 0 8px}
.logo-img{width:min(300px,68vw);height:auto;display:block}

.section-label{font-size:.8125rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding:0 2px}
.section-nav{margin-top:44px}

/* Grid — 2 col mobile, 3 col desktop */
.nav-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:640px){.nav-grid{grid-template-columns:repeat(3,1fr);gap:10px}}

/* Card padrão */
.nav-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  background:var(--surface);border-radius:var(--radius);padding:18px 12px 16px;
  border:1.5px solid var(--border);cursor:pointer;position:relative;z-index:1;
  transition:border-color .2s,transform .2s,background .2s;
  text-decoration:none;color:var(--fg);-webkit-tap-highlight-color:transparent;min-height:94px;text-align:center
}
.nav-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.nav-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.nav-card:active{transform:scale(.96)}
.nav-card svg{width:26px;height:26px;display:block;color:var(--fg);flex-shrink:0;margin-bottom:2px}
@media(min-width:640px){.nav-card svg{width:30px;height:30px}}
.nav-card .nav-label{font-size:.9375rem;font-weight:800;letter-spacing:-.02em;line-height:1.25;font-family:var(--font)}
.nav-card .nav-sub{font-size:.6875rem;color:var(--muted);font-weight:500;margin-top:1px;letter-spacing:.01em}

/* Card destacado — Médiuns (âncora visual) */
.nav-card.featured{
  background:color-mix(in srgb,var(--accent) 10%,var(--surface));
  border-color:color-mix(in srgb,var(--accent) 30%,var(--border))
}
.nav-card.featured svg{color:var(--accent)}
.nav-card.featured .nav-label{color:var(--accent)}
.nav-card.featured:hover{background:color-mix(in srgb,var(--accent) 16%,var(--surface))}
.nav-card.featured::after{
  content:'Início';position:absolute;top:8px;right:10px;
  font-size:.625rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);
  padding:2px 8px;border-radius:6px;line-height:1.5
}
@media(prefers-color-scheme:dark){
  .nav-card.featured{background:color-mix(in srgb,var(--accent) 16%,var(--surface))}
  .nav-card.featured:hover{background:color-mix(in srgb,var(--accent) 24%,var(--surface))}
  .nav-card.featured::after{background:color-mix(in srgb,var(--accent) 22%,transparent)}
}

/* Backup — compacto, sem competir */
.backup-area{margin-top:44px;padding-bottom:48px;display:flex;justify-content:center}
.backup-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:color-mix(in srgb,var(--bg) 50%,var(--surface));
  border:1.5px dashed var(--border);border-radius:20px;padding:12px 20px;
  cursor:pointer;transition:background .2s,border-color .2s;position:relative;z-index:1;
  color:var(--muted);font-size:.8125rem;font-weight:600;font-family:var(--font);
  -webkit-tap-highlight-color:transparent
}
.backup-btn:hover{background:var(--accent-light);border-color:var(--accent);border-style:solid;color:var(--accent)}
.backup-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.backup-btn:active{transform:scale(.97)}
.backup-btn svg{width:16px;height:16px;flex-shrink:0;color:currentColor}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;padding:20px 16px calc(16px + env(safe-area-inset-bottom,16px));transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.12);max-width:600px;margin:0 auto;outline:none}
@media(min-width:480px){.sheet{padding:24px 20px calc(20px + env(safe-area-inset-bottom,20px))}}
.sheet.open{transform:translateY(0)}
.sheet .handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.sheet .sheet-header{font-size:1.125rem;font-weight:700;font-family:var(--font);margin-bottom:16px;text-align:center}
.sheet .backup-option{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:.9375rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s,border-color .15s,color .15s;color:var(--fg);width:100%;margin-bottom:10px}
.sheet .backup-option:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.sheet .backup-option:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sheet .backup-option svg{width:22px;height:22px;flex-shrink:0;color:var(--accent)}
.sheet .backup-option:last-child{margin-bottom:0}

.toast-container{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:90vw;width:400px}
@media(min-width:480px){.toast-container{top:20px}}
.toast{padding:10px 14px;border-radius:var(--radius-sm);font-size:.875rem;font-weight:500;font-family:var(--font);box-shadow:0 4px 20px rgba(0,0,0,.15);pointer-events:auto;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease}
.toast-success{background:var(--accent);color:#fff}
.toast-error{background:var(--gold-dark);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-12px)}}

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.confirm-overlay.open{opacity:1;pointer-events:auto}
.confirm-box{background:var(--surface);border-radius:14px;padding:20px 24px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.confirm-box h3{font-size:1.125rem;font-weight:700;font-family:var(--font);margin-bottom:6px}
.confirm-box p{font-size:.875rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}
.confirm-actions button{flex:1;padding:10px 12px;border-radius:var(--radius-sm);font-size:.9375rem;font-weight:700;border:none;cursor:pointer;font-family:var(--font);transition:opacity .15s,transform .15s}
.confirm-actions button:hover{opacity:.9;transform:scale(1.02)}
.confirm-actions button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.confirm-actions button:active{transform:scale(.97)}
.confirm-confirm{background:var(--accent);color:#fff}
.confirm-cancel{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.confirm-danger{background:var(--gold-dark);color:#fff}

/* Tour */
.tour-highlight{position:relative;z-index:50;animation:tourPulse 2s ease-in-out infinite}
@keyframes tourPulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 40%,transparent)}50%{box-shadow:0 0 0 8px color-mix(in srgb,var(--accent) 0%,transparent)}}
.tour-tip{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:60;background:var(--accent);color:#fff;padding:12px 20px;border-radius:14px;font-size:.9375rem;font-weight:600;font-family:var(--font);box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:320px;text-align:center;pointer-events:none;animation:tourTipIn .4s ease;line-height:1.4}
.tour-tip::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:10px solid var(--accent)}
@keyframes tourTipIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.tour-tip .tour-dismiss{display:inline-block;margin-top:6px;padding:6px 14px;border-radius:8px;background:rgba(255,255,255,.2);font-size:.8125rem;font-weight:700;pointer-events:auto;cursor:pointer}
.tour-tip .tour-dismiss:hover{background:rgba(255,255,255,.3)}

.help-btn{position:fixed;bottom:20px;right:20px;z-index:90;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;font-family:var(--font);box-shadow:0 2px 12px rgba(0,0,0,.08);transition:transform .2s,background .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.help-btn:hover{transform:scale(1.08);border-color:var(--accent);background:var(--accent-light)}
.help-btn:active{transform:scale(.94)}
.help-btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.help-btn svg{width:20px;height:20px;display:block}
@media(min-width:768px){.help-btn{bottom:28px;right:28px}}
</style>
<script src="/auth-helper.js">
window.addEventListener('pageshow', function(event) {
  if (event.persisted) { window.location.reload(); }
});
</script>
</head>

  </button>
  <button class="backup-option" onclick="document.getElementById('restoreInput').click()" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="fecharConfirmacao()" type="button">Cancelar</button>

<script>
var API = '/api';
var confirmCallback = null;

function mostrarToast(msg, tipo) {
  tipo = tipo || 'info';
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast toast-' + tipo;
  el.textContent = msg;
  el.setAttribute('role', 'status');
  container.appendChild(el);
  setTimeout(function() {
    el.style.animation = 'toastOut .3s ease forwards';
    setTimeout(function() { el.remove(); }, 300);
  }, 3000);
}

function abrirBackupSheet() {
  document.getElementById('backupOverlay').classList.add('open');
  document.getElementById('backupSheet').classList.add('open');
}

function fecharBackupSheet() {
  document.getElementById('backupOverlay').classList.remove('open');
  document.getElementById('backupSheet').classList.remove('open');
}

async function fazerBackup() {
  fecharBackupSheet();
  try {
    var res = await fetch(API + '/backup');
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'centro360-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    mostrarToast('Backup exportado! Salve o arquivo.', 'success');
  } catch(e) { mostrarToast('Erro ao exportar: ' + e.message, 'error'); }
}

async function restaurarBackup(input) {
  fecharBackupSheet();
  var file = input.files[0];
  if(!file) return;
  mostrarConfirmacao(
    'Restaurar backup?',
    'Isso vai substituir todos os dados atuais. Esta ação não pode ser desfeita.',
    function() { executarRestore(file); },
    'danger'
  );
  input.value = '';
}

async function executarRestore(file) {
  try {
    var data = JSON.parse(await file.text());
    var res = await fetch(API + '/restore', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    var result = await res.json();
    if(result.success) {
      mostrarToast('Dados restaurados com sucesso!', 'success');
      setTimeout(function() { location.reload(); }, 800);
    } else {
      mostrarToast('Erro: ' + (result.error || 'Falha na restauração'), 'error');
    }
  } catch(e) { mostrarToast('Erro ao restaurar: ' + e.message, 'error'); }
}

function mostrarConfirmacao(title, msg, callback, style) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  var btn = document.getElementById('confirmBtn');
  btn.className = 'confirm-confirm' + (style === 'danger' ? ' confirm-danger' : '');
  btn.textContent = style === 'danger' ? 'Restaurar' : 'Confirmar';
  confirmCallback = callback;
  document.getElementById('confirmOverlay').classList.add('open');
  btn.focus();
}

function fecharConfirmacao() {
  document.getElementById('confirmOverlay').classList.remove('open');
  confirmCallback = null;
}

function executarConfirmacao() {
  if (confirmCallback) {
    var fn = confirmCallback;
    fecharConfirmacao();
    fn();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').classList.contains('open')) { fecharConfirmacao(); return; }
    if (document.getElementById('backupSheet').classList.contains('open')) { fecharBackupSheet(); return; }
  }
  if (!e.ctrlKey && !e.metaKey && !e.altKey) {
    if (e.key === '?' || (e.key === '/' && !e.ctrlKey)) { e.preventDefault(); mostrarAjuda(); return; }
    var navMap = {'1':0,'2':1,'3':2,'4':3,'5':4,'6':5};
    var idx = navMap[e.key];
    if (idx !== undefined) {
      var links = document.querySelectorAll('.nav-card');
      if (links[idx]) { e.preventDefault(); links[idx].click(); }
    }
  }
});

(function() {
  if (localStorage.getItem('centro360_tour_visto')) return;
  var primeiroCard = document.querySelector('.nav-card.featured');
  if (!primeiroCard) return;
  localStorage.setItem('centro360_tour_visto', '1');
  var tip = document.createElement('div');
  tip.className = 'tour-tip';
  tip.innerHTML = 'Comece por aqui — cadastre os <strong>Médiuns</strong> para começar a usar o Centro360.<br><span class="tour-dismiss" onclick="this.closest(\'.tour-tip\').remove()">Entendi</span>';
  document.body.appendChild(tip);
  primeiroCard.classList.add('tour-highlight');
  var removeHighlight = function() { primeiroCard.classList.remove('tour-highlight'); };
  tip.querySelector('.tour-dismiss').addEventListener('click', removeHighlight);
})();

function mostrarAjuda() {
  var tip = document.querySelector('.tour-tip');
  if (tip) { tip.remove(); }
  var primeiroCard = document.querySelector('.nav-card.featured');
  if (!primeiroCard) return;
  primeiroCard.classList.add('tour-highlight');
  tip = document.createElement('div');
  tip.className = 'tour-tip';
  tip.setAttribute('role', 'status');
  tip.innerHTML = 'Comece por aqui — cadastre os <strong>Médiuns</strong> para começar a usar o Centro360.<br><span class="tour-dismiss">Entendi</span>';
  document.body.appendChild(tip);
  var dismiss = tip.querySelector('.tour-dismiss');
  dismiss.addEventListener('click', function() {
    tip.remove();
    primeiroCard.classList.remove('tour-highlight');
  });
  setTimeout(function() { dismiss.focus(); }, 450);
}
</script>
</body>
</html>
