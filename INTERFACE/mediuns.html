<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Médiuns — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:120px auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}

.status-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 8px;font-size:13px;font-weight:600;color:var(--fg)}
.status-bar .time{font-weight:700}
.status-icons{display:flex;align-items:center;gap:5px}

.header{display:flex;align-items:center;gap:12px;padding:6px 16px 14px}
.header .back{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:20px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}

.search-bar{margin:0 16px 12px;position:relative}
.search-bar input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--surface);font-family:var(--font-body);color:var(--fg);outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted)}
.search-bar .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}

.list{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.list-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s}
.list-item:active{background:var(--accent-light);transform:scale(.98)}
.list-item .avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:17px;flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .name{font-size:16px;font-weight:600;font-family:var(--font-display)}
.list-item .detail{font-size:13px;color:var(--muted);margin-top:2px}
.list-item .status{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px}
.list-item .status.ativo{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.list-item .status.inativo{background:color-mix(in srgb,#e74c3c 12%,transparent);color:#e74c3c}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;padding:24px 20px calc(20px + env(safe-area-inset-bottom,16px));transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.sheet.open{transform:translateY(0)}
.sheet .handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.sheet h3{font-size:18px;font-weight:700;font-family:var(--font-display);margin-bottom:6px}
.sheet .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.sheet .info-row .val{font-weight:600;text-align:right;max-width:60%}
.sheet .info-row .lbl{color:var(--muted)}
.sheet .field-wrap{margin-top:12px}
.sheet .field-wrap label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sheet .field-wrap input,.sheet .field-wrap textarea,.sheet .field-wrap select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font-body);background:var(--bg);color:var(--fg);outline:none}
.sheet .field-wrap input:focus,.sheet .field-wrap textarea:focus,.sheet .field-wrap select:focus{border-color:var(--accent)}
.status-toggle{display:flex;gap:8px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all .15s}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sheet .sheet-actions{display:flex;gap:10px;margin-top:16px}
.sheet .sheet-actions button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font-display)}
.sheet .btn-delete{background:#fee2e2;color:#dc2626}
.sheet .btn-delete:active{opacity:.7}
.sheet .btn-save{background:var(--accent);color:#fff}
.sheet .btn-save:active{opacity:.8}

.fab{position:fixed;bottom:80px;right:max(16px,calc(50% - 197px));z-index:50}
.fab button{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 85%,#000));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px color-mix(in srgb,var(--accent) 40%,transparent),0 2px 6px color-mix(in srgb,var(--accent) 25%,transparent);transition:all .25s cubic-bezier(.32,.72,0,1)}
.fab button:active{transform:scale(.88) rotate(90deg);box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 30%,transparent)}
.fab button svg{transition:transform .3s cubic-bezier(.32,.72,0,1)}
.fab button:active svg{transform:rotate(90deg)}

.btn-report{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font-display);margin-top:8px;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);transition:all .15s}
.btn-report:active{opacity:.7;transform:scale(.97)}

.report-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;display:none;flex-direction:column}
.report-overlay.open{display:flex}
.report-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.report-header h2{font-size:18px;font-weight:700;font-family:var(--font-display);flex:1}
.report-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.report-close:active{background:var(--border)}
.report-body{padding:16px;flex:1}
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.report-section h3{font-size:14px;font-weight:700;font-family:var(--font-display);color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent-light)}
.report-field{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;border-bottom:1px solid var(--border)}
.report-field:last-child{border-bottom:none}
.report-field .lbl{color:var(--muted)}
.report-field .val{font-weight:600;text-align:right}
.report-name{font-size:22px;font-weight:700;font-family:var(--font-display);margin-bottom:2px}
.report-status{display:inline-block;font-size:12px;font-weight:600;padding:3px 12px;border-radius:20px;margin-bottom:10px}
.report-status.ativo{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.report-status.inativo{background:color-mix(in srgb,#e74c3c 12%,transparent);color:#e74c3c}
.report-empty{text-align:center;padding:20px;color:var(--muted);font-size:14px}
.report-empty svg{margin-bottom:8px;opacity:.4}
.report-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.report-item:last-child{border-bottom:none}
.report-item .ri-left{flex:1}
.report-item .ri-name{font-weight:600;font-family:var(--font-display)}
.report-item .ri-detail{font-size:12px;color:var(--muted);margin-top:1px}
.report-item .ri-right{text-align:right}
.report-item .ri-valor{font-weight:700;font-variant-numeric:tabular-nums}
.report-item .ri-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-left:6px}
.report-item .ri-tag.realizado{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.report-item .ri-tag.pendente{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}
.report-footer{padding:16px;border-top:1px solid var(--border);background:var(--surface);position:sticky;bottom:0;display:flex;gap:10px}
.report-footer button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font-display);transition:all .15s}
.report-footer button:active{transform:scale(.97)}
.btn-print{background:var(--accent);color:#fff}
.btn-whatsapp{background:#25D366;color:#fff}
.report-total-row{display:flex;justify-content:space-between;padding:8px 0;font-size:15px;border-top:2px solid var(--accent-light);margin-top:6px;font-weight:700;font-family:var(--font-display)}

@media print{
  body{background:#fff!important;max-width:100%!important;padding:0!important;margin:0!important}
  .status-bar,.header,.search-bar,.sheet-overlay,.sheet,.fab,.bottom-nav,.report-header,.report-footer{display:none!important}
  .report-overlay{position:relative!important;display:block!important;overflow:visible!important;background:#fff!important}
  .report-overlay.open{display:block!important}
  .report-body{padding:20px!important}
  .report-section{border:1px solid #ddd!important;break-inside:avoid!important;page-break-inside:avoid!important}
  .report-section h3{color:#2a7a5a!important}
  .report-name{font-size:24px!important}
}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item svg{width:24px;height:24px}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">10:28</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><rect x="12" y="3" width="3.5" height="6" rx="0.8" fill="currentColor"/><rect x="2.5" y="4" width="6" height="4" rx="0.5" fill="currentColor" opacity="0.85"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:2px"><path d="M8 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5 5c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
  </div>
</div>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Médiuns</h1>
</div>

<div class="search-bar">
  <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" placeholder="Buscar médium...">
</div>

<div class="list" id="listaMediuns"></div>

<div class="fab">
  <button onclick="location.href='adicionar.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
  </button>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h3>Editar Médium</h3>
  <div class="field-wrap">
    <label>Nome</label>
    <input type="text" id="editNome">
  </div>
  <div class="field-wrap">
    <label>Telefone</label>
    <input type="tel" id="editTel">
  </div>
  <div class="field-wrap">
    <label>Endereço</label>
    <input type="text" id="editEndereco">
  </div>
  <div class="field-wrap">
    <label>E-mail</label>
    <input type="email" id="editEmail">
  </div>
  <div class="field-wrap">
    <label>Data de nasc.</label>
    <input type="date" id="editNasc">
  </div>
  <div class="field-wrap">
    <label>Data de cadastro</label>
    <input type="date" id="editDataCadastro">
  </div>
  <div class="field-wrap">
    <label>Observações</label>
    <textarea id="editObs" rows="2"></textarea>
  </div>
  <div class="field-wrap">
    <label>Status</label>
    <div class="status-toggle">
      <button class="toggle-btn" data-status="Ativo" onclick="setStatus('Ativo')">Ativo</button>
      <button class="toggle-btn" data-status="Inativo" onclick="setStatus('Inativo')">Inativo</button>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn-delete" onclick="excluirMedium()">Excluir</button>
    <button class="btn-save" onclick="salvarMedium()">Salvar</button>
  </div>
  <button class="btn-report" onclick="gerarRelatorio(currentId)">📄 Relatório Financeiro</button>
</div>

<div class="report-overlay" id="reportOverlay">
  <div class="report-header">
    <button class="report-close" onclick="fecharRelatorio()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2>Relatório do Médium</h2>
    <div style="width:36px"></div>
  </div>
  <div class="report-body" id="reportBody"></div>
  <div class="report-footer">
    <button class="btn-print" onclick="gerarPDF()">📄 Gerar PDF</button>
    <button class="btn-whatsapp" onclick="compartilharWhatsApp()">📱 Compartilhar</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const API = '/api';
async function carregarMediuns(){
  try {
    const res = await fetch(`${API}/mediuns`);
    const lista = await res.json();
    renderizar(lista);
    return lista;
  } catch(e) { console.error('Erro ao carregar médiuns:', e); renderizar([]); }
}
function renderizar(lista){
  const el = document.getElementById('listaMediuns');
  el.innerHTML = lista.map(m => `<div class="list-item" onclick="abrirSheet(${m.id})">
    <div class="avatar">${m.iniciais || m.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
    <div class="info">
      <div class="name">${m.nome}</div>
      <div class="detail">${m.obs || ''} · desde ${m.data_cadastro ? new Date(m.data_cadastro+'T12:00:00').toLocaleDateString('pt-BR',{month:'short',year:'numeric'}) : '—'}</div>
    </div>
    <span class="status ${m.status === 'Ativo' ? 'ativo' : 'inativo'}">${m.status || 'Ativo'}</span>
  </div>`).join('');
}
let currentId = null;
function setStatus(val){
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === val);
  });
}
async function abrirSheet(id){
  try {
    const res = await fetch(`${API}/mediuns/${id}`);
    const m = await res.json();
    if(!m) return;
    currentId = id;
    document.getElementById('editNome').value = m.nome;
    document.getElementById('editTel').value = m.tel || '';
    document.getElementById('editEndereco').value = m.endereco || '';
    document.getElementById('editEmail').value = m.email || '';
    document.getElementById('editNasc').value = m.nasc || '';
    document.getElementById('editDataCadastro').value = m.data_cadastro || '';
    document.getElementById('editObs').value = m.obs || '';
    setStatus(m.status || 'Ativo');
    document.getElementById('sheetOverlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
  } catch(e) { console.error('Erro:', e); }
}
function fecharSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  currentId = null;
}
async function salvarMedium(){
  const lista = await fetch(`${API}/mediuns`).then(r => r.json());
  const existing = lista.find(x => x.id === currentId);
  if(!existing) return;
  const nome = document.getElementById('editNome').value.trim();
  const tel = document.getElementById('editTel').value.trim();
  const endereco = document.getElementById('editEndereco').value.trim();
  const email = document.getElementById('editEmail').value.trim();
  const nasc = document.getElementById('editNasc').value;
  const data_cadastro = document.getElementById('editDataCadastro').value;
  const obs = document.getElementById('editObs').value.trim();
  const status = document.querySelector('.toggle-btn.active')?.dataset?.status || 'Ativo';
  try {
    await fetch(`${API}/mediuns/${currentId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome, tipo: existing.tipo, tel, endereco, email, nasc, obs, data_cadastro, status }) });
    fecharSheet();
    carregarMediuns();
  } catch(e) { console.error('Erro ao salvar:', e); }
}
async function excluirMedium(){
  if(!confirm('Excluir este médium?')) return;
  try {
    await fetch(`${API}/mediuns/${currentId}`, { method: 'DELETE' });
    fecharSheet();
    carregarMediuns();
  } catch(e) { console.error('Erro ao excluir:', e); }
}
async function gerarRelatorio(id){
  try {
    const res = await fetch(`${API}/dashboard/medium/${id}`);
    const data = await res.json();
    const m = data.medium;
    if(!m) return;
    fecharSheet();
    const body = document.getElementById('reportBody');
    const header = m.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const resumo = data.resumo;

    function fmt(v){ return 'R$ '+v.toFixed(2).replace('.',','); }
    function mesLabel(d){
      if(!d.mes) return '';
      const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      const idx = parseInt(d.mes)-1;
      return (idx>=0&&idx<12?meses[idx]:d.mes)+'/'+(d.ano||'');
    }

    let html = `<div class="report-section">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:20px;flex-shrink:0">${header}</div>
        <div>
          <div class="report-name">${m.nome}</div>
          <span class="report-status ${m.status === 'Ativo' ? 'ativo' : 'inativo'}">${m.status || 'Ativo'}</span>
          <div style="font-size:13px;color:var(--muted);margin-top:2px">Cadastro: ${m.data_cadastro ? new Date(m.data_cadastro+'T12:00:00').toLocaleDateString('pt-BR') : '—'}</div>
        </div>
      </div>
      <div class="report-field"><span class="lbl">📞 Telefone</span><span class="val">${m.tel || '—'}</span></div>
      <div class="report-field"><span class="lbl">📍 Endereço</span><span class="val">${m.endereco || '—'}</span></div>
      <div class="report-field"><span class="lbl">✉ E-mail</span><span class="val">${m.email || '—'}</span></div>
      <div class="report-field"><span class="lbl">🎂 Nascimento</span><span class="val">${m.nasc ? new Date(m.nasc+'T12:00:00').toLocaleDateString('pt-BR') : '—'}</span></div>
      <div class="report-field"><span class="lbl">📝 Observações</span><span class="val">${m.obs || '—'}</span></div>
    </div>`;

    // MENSALIDADES
    if(data.mensalidades && data.mensalidades.length){
      html += `<div class="report-section"><h3>💰 Mensalidades</h3>`;
      data.mensalidades.forEach(d => {
        const sc = d.status==='pago'?'realizado':'pendente';
        const sl = {pago:'Pago',parcial:'Parcial',pendente:'Pendente'}[d.status]||d.status;
        html += `<div class="report-item">
          <div class="ri-left"><div class="ri-name">${d.nome}</div><div class="ri-detail">${mesLabel(d)}</div></div>
          <div class="ri-right">
            <span class="ri-valor">${fmt(d.valor)}</span>
            <span class="ri-tag ${sc}">${sl}</span>
            <div style="font-size:11px;color:var(--muted)">Pago: ${fmt(d.pago)}</div>
          </div>
        </div>`;
      });
      html += `<div class="report-total-row">
        <span>Total: ${fmt(resumo.mensalidade_total)}</span>
        <span style="color:var(--accent)">Pago: ${fmt(resumo.mensalidade_pago)}</span>
        <span style="color:#e67e22">Pend.: ${fmt(Math.max(0,resumo.mensalidade_pendente))}</span>
      </div></div>`;
    }

    // FAXINA
    if(data.faxinas && data.faxinas.length){
      html += `<div class="report-section"><h3>🧹 Faxina</h3>`;
      data.faxinas.forEach(d => {
        const pl = d.presenca==='feito'?'Feito':'Falta';
        const pc = d.presenca==='feito'?'realizado':'pendente';
        html += `<div class="report-item">
          <div class="ri-left"><div class="ri-name">${d.nome}</div><div class="ri-detail">${mesLabel(d)} · ${pl} · ${d.pagamento==='pago'?'Pago':'Não Pago'}</div></div>
          <div class="ri-right">
            ${d.presenca==='falta'?'<span class="ri-valor">'+fmt(d.valor)+'</span>':'<span style="color:var(--accent);font-size:13px">✔ Isento</span>'}
            <span class="ri-tag ${pc}">${pl}</span>
          </div>
        </div>`;
      });
      html += `<div class="report-total-row">
        <span style="color:#e74c3c">Cobrado por faltas: ${fmt(resumo.faxina_faltas)}</span>
      </div></div>`;
    }

    // DESPESAS
    if(data.despesas && data.despesas.length){
      html += `<div class="report-section"><h3>📋 Despesas (sua parte)</h3>`;
      data.despesas.forEach(d => {
        const sc = d.status==='paga'?'realizado':d.status==='parcial'?'pendente':'pendente';
        const sl = d.status.charAt(0).toUpperCase()+d.status.slice(1);
        html += `<div class="report-item">
          <div class="ri-left">
            <div class="ri-name">${d.item}</div>
            <div class="ri-detail">${mesLabel(d)} · Parc. ${d.parcela} · Dividido entre ${d.divisao}</div>
          </div>
          <div class="ri-right">
            <span class="ri-valor">${fmt(d.por_medium)}</span>
            <span class="ri-tag ${sc}">${sl}</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    // TRABALHOS
    if(data.trabalhos && data.trabalhos.length){
      html += `<div class="report-section"><h3>⭐ Trabalhos (sua parte)</h3>`;
      data.trabalhos.forEach(d => {
        const sc = d.status==='realizado'?'realizado':d.status==='futuro'?'pendente':'pendente';
        const sl = d.status.charAt(0).toUpperCase()+d.status.slice(1);
        html += `<div class="report-item">
          <div class="ri-left">
            <div class="ri-name">${d.entidade}</div>
            <div class="ri-detail">${mesLabel(d)} · Dividido entre ${d.divisao}</div>
          </div>
          <div class="ri-right">
            <span class="ri-valor">${fmt(d.por_medium)}</span>
            <span class="ri-tag ${sc}">${sl}</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    // EXTRAS
    if(data.extras && data.extras.length){
      html += `<div class="report-section"><h3>➕ Extras</h3>`;
      data.extras.forEach(d => {
        const isRec = d.tipo==='receita';
        const sc = isRec?'realizado':'pendente';
        const sl = isRec?'Receita':'Gasto';
        html += `<div class="report-item">
          <div class="ri-left">
            <div class="ri-name">${d.item}</div>
            <div class="ri-detail">${mesLabel(d)} · Parc. ${d.parcela} · Qtd: ${d.qtd} · Div. entre ${d.divisao}</div>
          </div>
          <div class="ri-right">
            <span class="ri-valor" style="color:${isRec?'var(--accent)':'#e74c3c'}">${isRec?'+':'−'}${fmt(d.por_medium)}</span>
            <span class="ri-tag ${sc}">${sl}</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    const today = new Date().toLocaleDateString('pt-BR');
    html += `<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted)">Relatório gerado em ${today} · Mejepra Financeiro</div>`;

    body.innerHTML = html;
    document.getElementById('reportOverlay').classList.add('open');
  } catch(e) { console.error('Erro ao gerar relatório:', e); }
}
function fecharRelatorio(){
  document.getElementById('reportOverlay').classList.remove('open');
}
function gerarPDF(){
  const body = document.getElementById('reportBody');
  const nome = document.querySelector('.report-name')?.textContent || 'Relatorio';
  const btn = document.querySelector('.btn-print');
  const originalText = btn.textContent;
  btn.textContent = '⏳ Gerando...';
  btn.style.pointerEvents = 'none';

  const container = document.createElement('div');
  container.innerHTML = body.innerHTML;
  container.style.cssText = 'font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;max-width:700px;margin:0 auto;padding:20px;color:#1a1a1a;font-size:13px;';

  const styleEl = document.createElement('style');
  styleEl.textContent = `
    *{margin:0;padding:0;box-sizing:border-box}
    h3{font-size:13px;color:#2a7a5a;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid #e8f5e9}
    .report-name{font-size:18px;font-weight:700;margin-bottom:2px}
    .report-status{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:16px}
    .report-status.ativo{background:#e8f5e9;color:#2a7a5a}
    .report-status.inativo{background:#fee2e2;color:#dc2626}
    .report-field{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid #f0f0f0}
    .report-field .lbl{color:#666}
    .report-field .val{font-weight:600;text-align:right}
    .report-item{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
    .report-item:last-child{border-bottom:none}
    .ri-name{font-weight:600}
    .ri-detail{font-size:10px;color:#888;margin-top:1px}
    .ri-valor{font-weight:700;white-space:nowrap}
    .ri-tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600}
    .ri-tag.realizado{background:#e8f5e9;color:#2a7a5a}
    .ri-tag.pendente{background:#fff3e0;color:#e67e22}
    .report-section{margin-bottom:10px;padding:10px;border:1px solid #e0e0e0;border-radius:6px}
  `;
  container.prepend(styleEl);
  document.body.appendChild(container);

  const opt = {
    margin: [10, 10, 10, 10],
    filename: `${nome.replace(/\s+/g,'_')}_Mejepra.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(container).save().then(() => {
    document.body.removeChild(container);
    btn.textContent = originalText;
    btn.style.pointerEvents = 'auto';
  }).catch(() => {
    document.body.removeChild(container);
    btn.textContent = originalText;
    btn.style.pointerEvents = 'auto';
  });
}
function compartilharWhatsApp(){
  const nome = document.querySelector('.report-name')?.textContent || 'Médium';
  const status = document.querySelector('.report-status')?.textContent || '';
  const fields = document.querySelectorAll('.report-field');
  const tel = fields[0]?.querySelector('.val')?.textContent || '—';
  const end = fields[1]?.querySelector('.val')?.textContent || '—';
  const email = fields[2]?.querySelector('.val')?.textContent || '—';

  let texto = `📋 *Relatório Financeiro — ${nome}*\n`;
  texto += `📊 Status: ${status}\n\n`;
  texto += `📞 ${tel}\n📍 ${end}\n✉ ${email}\n`;

  const totalRows = document.querySelectorAll('.report-total-row');
  const sections = document.querySelectorAll('.report-section h3');

  sections.forEach((h3, i) => {
    texto += `\n${h3.textContent}\n`;
    if(totalRows[i]){
      texto += totalRows[i].textContent.trim() + '\n';
    }
  });

  const today = new Date().toLocaleDateString('pt-BR');
  texto += `\n_Relatório gerado em ${today} — Mejepra Financeiro_`;

  const encoded = encodeURIComponent(texto);
  window.open(`https://wa.me/?text=${encoded}`, '_blank');
}

document.querySelector('.search-bar input').addEventListener('input', async function(){
  const q = this.value.toLowerCase();
  try {
    const res = await fetch(`${API}/mediuns`);
    const lista = await res.json();
    renderizar(lista.filter(m => m.nome.toLowerCase().includes(q)));
  } catch(e) {}
});
carregarMediuns();
