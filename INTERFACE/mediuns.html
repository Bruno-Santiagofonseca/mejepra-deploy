<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Médiuns — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:100%;margin:0 auto;min-height:100dvh;padding:0 clamp(12px,3vw,40px)}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:clamp(80px,10vw,120px) auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}

.header{display:flex;align-items:center;gap:clamp(8px,2vw,12px);padding:6px 0 14px}
.header .back{width:clamp(36px,5vw,40px);height:clamp(36px,5vw,40px);border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:clamp(18px,2.5vw,20px);font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}

.search-bar{margin:0 0 12px;position:relative}
.search-bar input{width:100%;padding:clamp(10px,1.5vw,12px) clamp(14px,2vw,16px) clamp(10px,1.5vw,12px) clamp(36px,5vw,42px);border:1.5px solid var(--border);border-radius:12px;font-size:clamp(14px,1.8vw,15px);background:var(--surface);font-family:var(--font-body);color:var(--fg);outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted)}
.search-bar .search-icon{position:absolute;left:clamp(12px,2vw,14px);top:50%;transform:translateY(-50%);color:var(--muted)}

.list{flex:1;overflow-y:auto;padding:0 0 16px;display:flex;flex-direction:column;gap:clamp(6px,1.5vw,8px)}
.list-item{display:flex;align-items:center;gap:clamp(12px,2vw,14px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(12px,2vw,14px) clamp(14px,2vw,16px);cursor:pointer;transition:all .15s}
.list-item:active{background:var(--accent-light);transform:scale(.98)}
.list-item .avatar{width:clamp(40px,5vw,44px);height:clamp(40px,5vw,44px);border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:clamp(15px,2vw,17px);flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .name{font-size:clamp(14px,2vw,16px);font-weight:600;font-family:var(--font-display)}
.list-item .detail{font-size:clamp(12px,1.5vw,13px);color:var(--muted);margin-top:2px}
.list-item .status{font-size:clamp(11px,1.3vw,12px);font-weight:600;padding:clamp(3px,0.5vw,4px) clamp(8px,1.2vw,10px);border-radius:20px}
.list-item .status.ativo{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.list-item .status.inativo{background:color-mix(in srgb,#e74c3c 12%,transparent);color:#e74c3c}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;padding:clamp(20px,3vw,24px) clamp(16px,3vw,20px) calc(clamp(16px,3vw,20px) + env(safe-area-inset-bottom,16px));transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.12);max-width:600px;margin:0 auto}
.sheet.open{transform:translateY(0)}
.sheet .handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.sheet h3{font-size:clamp(16px,2vw,18px);font-weight:700;font-family:var(--font-display);margin-bottom:6px}
.sheet .info-row{display:flex;justify-content:space-between;padding:clamp(8px,1.5vw,10px) 0;border-bottom:1px solid var(--border);font-size:clamp(13px,1.6vw,14px)}
.sheet .info-row .val{font-weight:600;text-align:right;max-width:60%}
.sheet .info-row .lbl{color:var(--muted)}
.sheet .field-wrap{margin-top:clamp(10px,2vw,12px)}
.sheet .field-wrap label{display:block;font-size:clamp(11px,1.3vw,12px);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sheet .field-wrap input,.sheet .field-wrap textarea,.sheet .field-wrap select{width:100%;padding:clamp(8px,1.5vw,10px) clamp(10px,1.5vw,12px);border:1.5px solid var(--border);border-radius:10px;font-size:clamp(14px,1.8vw,15px);font-family:var(--font-body);background:var(--bg);color:var(--fg);outline:none}
.sheet .field-wrap input:focus,.sheet .field-wrap textarea:focus,.sheet .field-wrap select:focus{border-color:var(--accent)}
.status-toggle{display:flex;gap:clamp(6px,1.5vw,8px)}
.toggle-btn{flex:1;padding:clamp(8px,1.5vw,10px);border-radius:10px;font-size:clamp(13px,1.6vw,14px);font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all .15s}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sheet .sheet-actions{display:flex;gap:clamp(8px,2vw,10px);margin-top:clamp(14px,2vw,16px)}
.sheet .sheet-actions button{flex:1;padding:clamp(12px,2vw,14px);border-radius:12px;font-size:clamp(14px,1.8vw,15px);font-weight:700;border:none;cursor:pointer;font-family:var(--font-display)}
.sheet .btn-delete{background:#fee2e2;color:#dc2626}
.sheet .btn-delete:active{opacity:.7}
.sheet .btn-save{background:var(--accent);color:#fff}
.sheet .btn-save:active{opacity:.8}

.fab{position:fixed;bottom:clamp(70px,10vh,80px);right:clamp(12px,3vw,24px);z-index:50}
.fab button{width:clamp(52px,7vw,58px);height:clamp(52px,7vw,58px);border-radius:50%;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 85%,#000));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px color-mix(in srgb,var(--accent) 40%,transparent),0 2px 6px color-mix(in srgb,var(--accent) 25%,transparent);transition:all .25s cubic-bezier(.32,.72,0,1)}
.fab button:active{transform:scale(.88) rotate(90deg);box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 30%,transparent)}
.fab button svg{transition:transform .3s cubic-bezier(.32,.72,0,1)}
.fab button:active svg{transform:rotate(90deg)}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 0 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:clamp(10px,1.2vw,10px);font-weight:500;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item svg{width:clamp(20px,3vw,24px);height:clamp(20px,3vw,24px)}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="location.replace('index.html')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Médiuns</h1>
</div>

<div class="search-bar">
  <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" placeholder="Buscar médium...">
</div>

<div class="list" id="listaMediuns"></div>

<div class="fab">
  <button onclick="location.href='adicionar.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
  </button>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h3>Editar Médium</h3>
  <div class="field-wrap">
    <label>Nome</label>
    <input type="text" id="editNome">
  </div>
  <div class="field-wrap">
    <label>Telefone</label>
    <input type="tel" id="editTel">
  </div>
  <div class="field-wrap">
    <label>Endereço</label>
    <input type="text" id="editEndereco">
  </div>
  <div class="field-wrap">
    <label>E-mail</label>
    <input type="email" id="editEmail">
  </div>
  <div class="field-wrap">
    <label>Data de nasc.</label>
    <input type="date" id="editNasc">
  </div>
  <div class="field-wrap">
    <label>Data de cadastro</label>
    <input type="date" id="editDataCadastro">
  </div>
  <div class="field-wrap">
    <label>Observações</label>
    <textarea id="editObs" rows="2"></textarea>
  </div>
  <div class="field-wrap">
    <label>Status</label>
    <div class="status-toggle">
      <button class="toggle-btn" data-status="Ativo" onclick="setStatus('Ativo')">Ativo</button>
      <button class="toggle-btn" data-status="Inativo" onclick="setStatus('Inativo')">Inativo</button>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn-delete" onclick="excluirMedium()">Excluir</button>
    <button class="btn-save" onclick="salvarMedium()">Salvar</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
async function carregarMediuns(){
  try {
    const res = await fetch(`${API}/mediuns`);
    const lista = await res.json();
    renderizar(lista);
    return lista;
  } catch(e) { console.error('Erro ao carregar médiuns:', e); renderizar([]); }
}
function renderizar(lista){
  const el = document.getElementById('listaMediuns');
  el.innerHTML = lista.map(m => `<div class="list-item" onclick="abrirSheet(${m.id})">
    <div class="avatar">${m.iniciais || m.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
    <div class="info">
      <div class="name">${m.nome}</div>
      <div class="detail">${m.obs || ''} · desde ${m.data_cadastro ? new Date(m.data_cadastro+'T12:00:00').toLocaleDateString('pt-BR',{month:'short',year:'numeric'}) : '—'}</div>
    </div>
    <span class="status ${m.status === 'Ativo' ? 'ativo' : 'inativo'}">${m.status || 'Ativo'}</span>
  </div>`).join('');
}
let currentId = null;
function setStatus(val){
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === val);
  });
}
async function abrirSheet(id){
  try {
    const res = await fetch(`${API}/mediuns/${id}`);
    const m = await res.json();
    if(!m) return;
    currentId = id;
    document.getElementById('editNome').value = m.nome;
    document.getElementById('editTel').value = m.tel || '';
    document.getElementById('editEndereco').value = m.endereco || '';
    document.getElementById('editEmail').value = m.email || '';
    document.getElementById('editNasc').value = m.nasc || '';
    document.getElementById('editDataCadastro').value = m.data_cadastro || '';
    document.getElementById('editObs').value = m.obs || '';
    setStatus(m.status || 'Ativo');
    document.getElementById('sheetOverlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
  } catch(e) { console.error('Erro:', e); }
}
function fecharSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  currentId = null;
}
async function salvarMedium(){
  const lista = await fetch(`${API}/mediuns`).then(r => r.json());
  const existing = lista.find(x => x.id === currentId);
  if(!existing) return;
  const nome = document.getElementById('editNome').value.trim();
  const tel = document.getElementById('editTel').value.trim();
  const endereco = document.getElementById('editEndereco').value.trim();
  const email = document.getElementById('editEmail').value.trim();
  const nasc = document.getElementById('editNasc').value;
  const data_cadastro = document.getElementById('editDataCadastro').value;
  const obs = document.getElementById('editObs').value.trim();
  const status = document.querySelector('.toggle-btn.active')?.dataset?.status || 'Ativo';
  try {
    await fetch(`${API}/mediuns/${currentId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome, tipo: existing.tipo, tel, endereco, email, nasc, obs, data_cadastro, status }) });
    fecharSheet();
    carregarMediuns();
  } catch(e) { console.error('Erro ao salvar:', e); }
}
async function excluirMedium(){
  if(!confirm('Excluir este médium?')) return;
  try {
    await fetch(`${API}/mediuns/${currentId}`, { method: 'DELETE' });
    fecharSheet();
    carregarMediuns();
  } catch(e) { console.error('Erro ao excluir:', e); }
}
document.querySelector('.search-bar input').addEventListener('input', async function(){
  const q = this.value.toLowerCase();
  try {
    const res = await fetch(`${API}/mediuns`);
    const lista = await res.json();
    renderizar(lista.filter(m => m.nome.toLowerCase().includes(q)));
  } catch(e) {}
});
carregarMediuns();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}
</script>
</body>
</html>
