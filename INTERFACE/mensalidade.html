<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Mensalidade — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:120px auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}

.header{display:flex;align-items:center;gap:12px;padding:6px 16px 14px}
.header .back{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:20px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}

.period-bar{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px}
.period-bar .month{font-size:17px;font-weight:700;font-family:var(--font-display)}
.period-bar .nav-arrows{display:flex;gap:4px}
.period-bar .nav-arrows button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg);transition:all .1s}
.period-bar .nav-arrows button:active{background:var(--border)}

.default-valor-bar{padding:0 16px 12px}
.default-valor-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.default-valor-input label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.default-valor-input .input-row{display:flex;gap:8px}
.default-valor-input .input-row input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:var(--font-body);color:var(--fg);outline:none;background:var(--bg)}
.default-valor-input .input-row input:focus{border-color:var(--accent)}
.default-valor-input .input-row button{white-space:nowrap;padding:10px 14px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-display);transition:all .15s}
.default-valor-input .input-row button:active{transform:scale(.95)}

.period-total{display:flex;gap:12px;padding:0 16px 14px}
.period-total .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.period-total .stat-card .label{font-size:12px;color:var(--muted);font-weight:500}
.period-total .stat-card .value{font-size:18px;font-weight:700;margin-top:4px;font-family:var(--font-display)}
.period-total .stat-card .value.pago{color:var(--accent)}
.period-total .stat-card .value.pendente{color:#e67e22}

.list{flex:1;overflow-y:auto;padding:0 16px 80px;display:flex;flex-direction:column;gap:8px}
.list-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s}
.list-item:active{background:var(--accent-light);transform:scale(.98)}
.list-item .avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:15px;flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .name{font-size:16px;font-weight:600;font-family:var(--font-display)}
.list-item .row-detail{display:flex;gap:16px;margin-top:3px;font-size:13px}
.list-item .row-detail .label{color:var(--muted)}
.list-item .row-detail .val{font-weight:700;font-variant-numeric:tabular-nums}
.list-item .row-detail .val.accent{color:var(--accent)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag.pago{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.tag.parcial{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}
.tag.pendente{background:color-mix(in srgb,#e74c3c 12%,transparent);color:#e74c3c}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item svg{width:24px;height:24px}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}

/* Sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:10}
.sheet{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 32px;z-index:11;box-shadow:0 -4px 30px rgba(0,0,0,0.1)}
.sheet.open,.overlay.open{display:block}
.sheet .handle{width:36px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 16px}
.sheet h2{font-size:18px;font-weight:700;font-family:var(--font-display);margin-bottom:16px;text-align:center}
.sheet .field{margin-bottom:14px}
.sheet .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
.sheet .field input,.sheet .field select{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:var(--font-body);color:var(--fg);outline:none;transition:border .2s;background:var(--bg)}
.sheet .field input:focus,.sheet .field select:focus{border-color:var(--accent)}
.sheet select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px;-webkit-appearance:none;appearance:none}
.sheet .status-options{display:flex;gap:8px;margin-bottom:20px}
.sheet .status-options button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);color:var(--muted);transition:all .15s}
.sheet .status-options button.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.sheet .btn-salvar{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-display);transition:all .15s}
.sheet .btn-salvar:active{transform:scale(.97)}
.sheet .btn-excluir{width:100%;padding:12px;border:none;border-radius:12px;background:transparent;color:#e74c3c;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-top:8px}
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Mensalidade</h1>
</div>

<div class="period-bar">
  <span class="month">Maio 2026</span>
  <div class="nav-arrows">
    <button onclick="navegarMes(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button onclick="navegarMes(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<div class="default-valor-bar">
  <div class="default-valor-input">
    <label>Valor padrão da mensalidade</label>
    <div class="input-row">
      <input type="number" id="inputPadrao" placeholder="0,00" step="0.01" min="0">
      <button onclick="aplicarParaTodos()">Aplicar a todos</button>
    </div>
  </div>
</div>

<div class="period-total" id="totalCard">
  <div class="stat-card">
    <div class="label">Previsto</div>
    <div class="value" id="totalPrevisto">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Recebido</div>
    <div class="value pago" id="totalRecebido">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Pendente</div>
    <div class="value pendente" id="totalPendente">R$ 0</div>
  </div>
</div>

<div class="list" id="listaMensalidades"></div>


<div class="overlay" id="overlay" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h2 id="sheetTitle">Editar Mensalidade</h2>

  <div class="field">
    <label>Médium</label>
    <div id="sheetNome" style="padding:14px;background:var(--bg);border-radius:12px;font-size:16px;font-weight:600;color:var(--fg)"></div>
  </div>
  <div class="field">
    <label>Valor da mensalidade (R$)</label>
    <input type="number" id="inputValor" placeholder="0,00" step="0.01" min="0">
  </div>
  <div class="field">
    <label>Valor pago (R$)</label>
    <input type="number" id="inputPago" placeholder="0,00" step="0.01" min="0">
  </div>

  <div id="faltanteDisplay" style="display:none;text-align:center;padding:8px;border-radius:10px;background:color-mix(in srgb,#e67e22 12%,transparent);color:#e67e22;font-size:14px;font-weight:700;margin-bottom:12px"></div>

  <div class="status-options">
    <button class="selected" data-status="pago" onclick="selecionarStatus(this)">Pago</button>
    <button data-status="parcial" onclick="selecionarStatus(this)">Parcial</button>
    <button data-status="pendente" onclick="selecionarStatus(this)">Pendente</button>
  </div>

  <button class="btn-salvar" onclick="salvarMensalidade()">Salvar</button>
  <button class="btn-excluir" id="btnExcluir" onclick="excluirMensalidade()">Excluir</button>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
function getMesAno(){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  return { mes: (meses.indexOf(partes[0])+1).toString().padStart(2,'0'), ano: partes[1] };
}
let mediunsAtivos = [];
let dados = [];
let editingId = null;
let editingMediumId = null;
let statusAtual = "pago";

async function carregarDados(){
  const mA = getMesAno();
  try {
    const [resMediuns, resMens] = await Promise.all([
      fetch(`${API}/mediuns`),
      fetch(`${API}/mensalidades?mes=${mA.mes}&ano=${mA.ano}`)
    ]);
    mediunsAtivos = (await resMediuns.json()).filter(m => m.status === 'Ativo');
    dados = await resMens.json();

    const mensalidadesMap = {};
    dados.forEach(m => { mensalidadesMap[m.medium_id] = m; });

    dados = mediunsAtivos.map(med => {
      const existing = mensalidadesMap[med.id];
      if(existing){
        return { ...existing, medium_nome: med.nome, medium_iniciais: med.iniciais };
      } else {
        return { id: null, medium_id: med.id, nome: med.nome, valor: 0, pago: 0, status: 'pendente', mes: mA.mes, ano: mA.ano, medium_iniciais: med.iniciais, novo: true };
      }
    });

    renderizar();
  } catch(e) { console.error('Erro:', e); dados = []; renderizar(); }
}
function renderizar(){
  const lista = document.getElementById("listaMensalidades");
  lista.innerHTML = "";
  let totalPrev = 0, totalPago = 0;
  dados.forEach(d => {
    totalPrev += d.valor;
    totalPago += d.pago;
    const statusLabel = {pago:"Pago",parcial:"Parcial",pendente:"Pendente"}[d.status];
    const statusClass = d.status;
    const iniciais = d.medium_iniciais || d.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const item = document.createElement("div");
    item.className = "list-item";
    item.onclick = () => editarMensalidade(d.medium_id);
    item.innerHTML = `
      <div class="avatar">${iniciais}</div>
      <div class="info">
        <div class="name">${d.nome}</div>
        <div class="row-detail">
          <span><span class="label">Mensalidade</span> <span class="val">R$ ${d.valor.toFixed(2)}</span></span>
          <span><span class="label">Pago</span> <span class="val accent">R$ ${d.pago.toFixed(2)}</span></span>
        </div>
      </div>
      <span class="tag ${statusClass}">${statusLabel}</span>
    `;
    lista.appendChild(item);
  });
  document.getElementById("totalPrevisto").textContent = "R$ "+totalPrev.toFixed(2);
  document.getElementById("totalRecebido").textContent = "R$ "+totalPago.toFixed(2);
  document.getElementById("totalPendente").textContent = "R$ "+(totalPrev-totalPago).toFixed(2);
}

function abrirSheet(dadosEdicao){
  editingId = dadosEdicao.id;
  editingMediumId = dadosEdicao.medium_id;
  document.getElementById("sheetTitle").textContent = "Editar Mensalidade";
  document.getElementById("sheetNome").textContent = dadosEdicao.nome;
  document.getElementById("inputValor").value = dadosEdicao.valor !== undefined && dadosEdicao.valor !== '' ? dadosEdicao.valor : "";
  document.getElementById("inputPago").value = dadosEdicao.pago !== undefined && dadosEdicao.pago !== '' ? dadosEdicao.pago : "";
  document.getElementById("btnExcluir").style.display = dadosEdicao.id ? "block" : "none";
  statusAtual = dadosEdicao.status || "pendente";
  document.querySelectorAll(".status-options button").forEach(b => {
    b.classList.toggle("selected", b.dataset.status === statusAtual);
  });
  atualizarFaltante();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

function fecharSheet(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  editingId = null;
  editingMediumId = null;
}

function selecionarStatus(el){
  document.querySelectorAll(".status-options button").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  statusAtual = el.dataset.status;
  if(statusAtual === "pago"){
    const valor = parseFloat(document.getElementById("inputValor").value) || 0;
    document.getElementById("inputPago").value = valor;
  }
  atualizarFaltante();
}

function atualizarFaltante(){
  const valor = parseFloat(document.getElementById("inputValor").value) || 0;
  const pago = parseFloat(document.getElementById("inputPago").value) || 0;
  const el = document.getElementById("faltanteDisplay");
  if(valor > 0 && pago < valor){
    el.style.display = "block";
    el.textContent = "⏳ Faltam: R$ " + (valor - pago).toFixed(2).replace('.', ',');
  } else {
    el.style.display = "none";
  }
}

async function salvarMensalidade(){
  const valor = parseFloat(document.getElementById("inputValor").value) || 0;
  const pago = parseFloat(document.getElementById("inputPago").value) || 0;
  if(valor <= 0){ alert("Preencha o valor da mensalidade."); return; }
  const mA = getMesAno();
  const med = mediunsAtivos.find(m => m.id === editingMediumId);
  const body = { medium_id: editingMediumId, nome: med ? med.nome : '', valor, pago, status:statusAtual, mes: mA.mes, ano: mA.ano };
  try {
    if(editingId){
      await fetch(`${API}/mensalidades/${editingId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    } else {
      await fetch(`${API}/mensalidades`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }
    fecharSheet();
    carregarDados();
  } catch(e) { console.error('Erro:', e); alert('Erro ao salvar'); }
}

async function excluirMensalidade(){
  if(!editingId) return;
  if(!confirm("Excluir esta mensalidade?")) return;
  try {
    await fetch(`${API}/mensalidades/${editingId}`, { method: 'DELETE' });
    fecharSheet();
    carregarDados();
  } catch(e) { console.error('Erro:', e); }
}

function editarMensalidade(mediumId){
  const d = dados.find(x => x.medium_id === mediumId);
  if(d) abrirSheet(d);
}

function navegarMes(dir){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  let mes = meses.indexOf(partes[0]), ano = parseInt(partes[1]);
  mes += dir;
  if(mes<0){ mes=11; ano--; } else if(mes>11){ mes=0; ano++; }
  span.textContent = meses[mes]+" "+ano;
  carregarDados();
}

async function aplicarParaTodos(){
  const valor = parseFloat(document.getElementById("inputPadrao").value);
  if(!valor || valor <= 0){ alert("Digite um valor válido para aplicar a todos."); return; }
  if(!confirm(`Aplicar R$ ${valor.toFixed(2)} como valor padrão para todos os médiuns?`)) return;
  try {
    for(const d of dados){
      const mA = getMesAno();
      const med = mediunsAtivos.find(m => m.id === d.medium_id);
      const body = { medium_id: d.medium_id, nome: med ? med.nome : '', valor, pago: d.pago, status: d.status, mes: mA.mes, ano: mA.ano };
      if(d.id){
        await fetch(`${API}/mensalidades/${d.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      } else if(valor > 0){
        await fetch(`${API}/mensalidades`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      }
    }
    document.getElementById("inputPadrao").value = "";
    carregarDados();
  } catch(e) { console.error('Erro:', e); }
}

document.getElementById('inputValor').addEventListener('input', atualizarFaltante);
document.getElementById('inputPago').addEventListener('input', atualizarFaltante);

carregarDados();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}
</script>
</body>
</html>
