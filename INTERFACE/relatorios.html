<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Relatórios — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:100%;margin:0 auto;min-height:100dvh;padding:0 clamp(12px,3vw,40px)}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:clamp(80px,10vw,120px) auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}

.header{display:flex;align-items:center;gap:clamp(8px,2vw,12px);padding:6px 0 14px}
.header .back{width:clamp(36px,5vw,40px);height:clamp(36px,5vw,40px);border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:clamp(18px,2.5vw,20px);font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}

.period-bar{display:flex;justify-content:space-between;align-items:center;padding:0 0 12px;position:relative;z-index:1}
.period-bar .month{font-size:clamp(16px,2vw,17px);font-weight:700;font-family:var(--font-display)}
.period-bar .nav-arrows{display:flex;gap:4px}
.period-bar .nav-arrows button{width:clamp(32px,4vw,36px);height:clamp(32px,4vw,36px);border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg);transition:all .1s}
.period-bar .nav-arrows button:active{background:var(--border)}

.search-bar{margin:0 0 12px;position:relative}
.search-bar input{width:100%;padding:clamp(10px,1.5vw,12px) clamp(14px,2vw,16px) clamp(10px,1.5vw,12px) clamp(36px,5vw,42px);border:1.5px solid var(--border);border-radius:12px;font-size:clamp(14px,1.8vw,15px);background:var(--surface);font-family:var(--font-body);color:var(--fg);outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted)}
.search-bar .search-icon{position:absolute;left:clamp(12px,2vw,14px);top:50%;transform:translateY(-50%);color:var(--muted)}

.list{flex:1;overflow-y:auto;padding:0 0 16px;display:flex;flex-direction:column;gap:clamp(6px,1.5vw,8px)}
.list-item{display:flex;align-items:center;gap:clamp(12px,2vw,14px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(12px,2vw,14px) clamp(14px,2vw,16px);cursor:pointer;transition:all .15s}
.list-item:active{background:var(--accent-light);transform:scale(.98)}
.list-item .avatar{width:clamp(40px,5vw,44px);height:clamp(40px,5vw,44px);border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:clamp(15px,2vw,17px);flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .name{font-size:clamp(14px,2vw,16px);font-weight:600;font-family:var(--font-display)}
.list-item .detail{font-size:clamp(12px,1.5vw,13px);color:var(--muted);margin-top:2px}
.list-item .arrow{color:var(--muted);flex-shrink:0}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 0 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:clamp(10px,1.2vw,10px);font-weight:500;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item svg{width:clamp(20px,3vw,24px);height:clamp(20px,3vw,24px)}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}

/* Report overlay */
.report-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;display:none;flex-direction:column}
.report-overlay.open{display:flex}
.report-header{display:flex;align-items:center;gap:clamp(10px,2vw,12px);padding:clamp(12px,2vw,14px) clamp(14px,2vw,16px);border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.report-header h2{font-size:clamp(16px,2vw,18px);font-weight:700;font-family:var(--font-display);flex:1}
.report-close{width:clamp(32px,4vw,36px);height:clamp(32px,4vw,36px);border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.report-close:active{background:var(--border)}
.report-body{padding:clamp(14px,2vw,16px);flex:1}
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(14px,2vw,16px);margin-bottom:clamp(10px,2vw,12px)}
.report-section h3{font-size:clamp(13px,1.6vw,14px);font-weight:700;font-family:var(--font-display);color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:clamp(8px,1.5vw,10px);padding-bottom:6px;border-bottom:2px solid var(--accent-light)}
.report-field{display:flex;justify-content:space-between;padding:clamp(4px,0.8vw,5px) 0;font-size:clamp(13px,1.6vw,14px);border-bottom:1px solid var(--border)}
.report-field:last-child{border-bottom:none}
.report-field .lbl{color:var(--muted)}
.report-field .val{font-weight:600;text-align:right}
.report-name{font-size:clamp(18px,3vw,22px);font-weight:700;font-family:var(--font-display);margin-bottom:2px}
.report-status{display:inline-block;font-size:clamp(11px,1.3vw,12px);font-weight:600;padding:clamp(2px,0.5vw,3px) clamp(10px,1.5vw,12px);border-radius:20px;margin-bottom:10px}
.report-status.ativo{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.report-status.inativo{background:color-mix(in srgb,#e74c3c 12%,transparent);color:#e74c3c}
.report-item{display:flex;justify-content:space-between;align-items:center;padding:clamp(6px,1vw,8px) 0;border-bottom:1px solid var(--border)}
.report-item:last-child{border-bottom:none}
.report-item .ri-left{flex:1;min-width:0}
.report-item .ri-name{font-size:clamp(13px,1.6vw,14px);font-weight:600;font-family:var(--font-display)}
.report-item .ri-detail{font-size:clamp(11px,1.3vw,12px);color:var(--muted);margin-top:1px}
.report-item .ri-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;margin-left:10px}
.report-item .ri-valor{font-size:clamp(13px,1.6vw,14px);font-weight:700;font-variant-numeric:tabular-nums}
.report-item .ri-tag{font-size:clamp(10px,1.2vw,11px);font-weight:600;padding:clamp(2px,0.5vw,3px) clamp(8px,1.2vw,10px);border-radius:20px}
.report-item .ri-tag.realizado{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.report-item .ri-tag.pendente{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}
.report-item .ri-tag.pago{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.report-item .ri-tag.parcial{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}
.report-item .ri-tag.aberta{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}
.report-item .ri-tag.falta{background:color-mix(in srgb,#e74c3c 15%,transparent);color:#e74c3c}
.report-item .ri-tag.feito{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.report-total-row{display:flex;justify-content:space-between;align-items:center;padding:clamp(8px,1.5vw,10px) 0 0;font-size:clamp(13px,1.6vw,14px);font-weight:700;border-top:2px solid var(--border);margin-top:clamp(6px,1vw,8px)}
.report-footer{display:flex;gap:clamp(8px,2vw,10px);padding:clamp(12px,2vw,14px);border-top:1px solid var(--border);background:var(--surface);position:sticky;bottom:0}
.report-footer button{flex:1;padding:clamp(10px,1.5vw,12px);border:none;border-radius:12px;font-size:clamp(13px,1.6vw,14px);font-weight:700;font-family:var(--font-display);cursor:pointer;transition:all .15s}
.report-footer button:active{transform:scale(.97)}
.btn-print{background:var(--accent);color:#fff}
.btn-whatsapp{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border:1.5px solid var(--accent)}

@media print{
  .report-header,.report-footer,.bottom-nav{display:none!important}
  .report-overlay{position:static!important;display:block!important;overflow:visible!important}
  body::before{display:none!important}
  .report-body{padding:0!important}
}
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Relatórios Financeiros</h1>
</div>

<div class="period-bar">
  <span class="month">Maio 2026</span>
  <div class="nav-arrows">
    <button onclick="navegarMes(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button onclick="navegarMes(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<div class="search-bar">
  <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="searchInput" placeholder="Buscar médium..." oninput="filtrarMediuns()">
</div>

<div class="list" id="listaMediuns"></div>

<div class="report-overlay" id="reportOverlay">
  <div class="report-header">
    <button class="report-close" onclick="fecharRelatorio()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2>Relatório do Médium</h2>
    <div style="width:36px"></div>
  </div>
  <div class="report-body" id="reportBody"></div>
  <div class="report-footer">
    <button class="btn-print" onclick="gerarPDF()">📄 Gerar PDF</button>
    <button class="btn-whatsapp" onclick="compartilharWhatsApp()">📱 Compartilhar</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
let mediunsAtivos = [];
let relatorioDataAtual = null;

async function carregarMediuns(){
  try {
    const res = await fetch(`${API}/mediuns`);
    mediunsAtivos = (await res.json()).filter(m => m.status === 'Ativo');
    renderizar(mediunsAtivos);
  } catch(e) { console.error('Erro:', e); renderizar([]); }
}

function renderizar(lista){
  const el = document.getElementById('listaMediuns');
  if(lista.length === 0){
    el.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px">Nenhum médium ativo encontrado</div>';
    return;
  }
  el.innerHTML = lista.map(m => {
    const iniciais = m.iniciais || m.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="list-item" onclick="abrirRelatorio(${m.id})">
      <div class="avatar">${iniciais}</div>
      <div class="info">
        <div class="name">${m.nome}</div>
        <div class="detail">${m.tel || 'Sem telefone'}</div>
      </div>
      <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
}

function filtrarMediuns(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtrados = mediunsAtivos.filter(m => m.nome.toLowerCase().includes(q));
  renderizar(filtrados);
}

// ============================================================
// FONTE ÚNICA DE DADOS — usada por TELA, PDF e WHATSAPP
// ============================================================
async function gerarRelatorioData(id){
  const mA = getMesAno();
  const res = await fetch(`${API}/dashboard/medium/${id}?mes=${mA.mes}&ano=${mA.ano}`);
  const data = await res.json();
  if(!data.medium) return null;

  function fmt(v){ return 'R$ '+v.toFixed(2).replace('.',','); }
  function mesLabel(d){
    if(!d.mes) return '';
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const idx = parseInt(d.mes)-1;
    return (idx>=0&&idx<12?meses[idx]:d.mes)+'/'+(d.ano||'');
  }
  function statusTagClass(status){
    const map = {
      'realizado':'realizado','pago':'pago','feito':'feito',
      'pendente':'pendente','parcial':'parcial','aberta':'aberta','falta':'falta'
    };
    return map[status] || 'pendente';
  }
  function statusLabel(status){
    return status.charAt(0).toUpperCase()+status.slice(1);
  }

  const m = data.medium;
  const resumo = data.resumo;
  const header = m.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  return {
    medium: m,
    header,
    resumo,
    fmt,
    mesLabel,
    statusTagClass,
    statusLabel,
    mensalidades: data.mensalidades || [],
    faxinas: data.faxinas || [],
    despesas: data.despesas || [],
    trabalhos: data.trabalhos || []
  };
}

// ============================================================
// RENDERIZAÇÃO DA TELA — usa gerarRelatorioData()
// ============================================================
async function abrirRelatorio(id){
  const data = await gerarRelatorioData(id);
  if(!data) return;
  relatorioDataAtual = data;

  let html = `<div class="report-section">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:20px;flex-shrink:0">${data.header}</div>
      <div>
        <div class="report-name">${data.medium.nome}</div>
        <span class="report-status ${data.medium.status === 'Ativo' ? 'ativo' : 'inativo'}">${data.medium.status || 'Ativo'}</span>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Cadastro: ${data.medium.data_cadastro ? new Date(data.medium.data_cadastro+'T12:00:00').toLocaleDateString('pt-BR') : '—'}</div>
      </div>
    </div>
    <div class="report-field"><span class="lbl">📞 Telefone</span><span class="val">${data.medium.tel || '—'}</span></div>
    <div class="report-field"><span class="lbl">📍 Endereço</span><span class="val">${data.medium.endereco || '—'}</span></div>
    <div class="report-field"><span class="lbl">✉ E-mail</span><span class="val">${data.medium.email || '—'}</span></div>
    <div class="report-field"><span class="lbl">🎂 Nascimento</span><span class="val">${data.medium.nasc ? new Date(data.medium.nasc+'T12:00:00').toLocaleDateString('pt-BR') : '—'}</span></div>
    <div class="report-field"><span class="lbl">📝 Observações</span><span class="val">${data.medium.obs || '—'}</span></div>
  </div>`;

  if(data.mensalidades.length){
    html += `<div class="report-section"><h3>💰 Mensalidades</h3>`;
    data.mensalidades.forEach(d => {
      const sc = d.status==='pago'?'realizado':'pendente';
      const sl = {pago:'Pago',parcial:'Parcial',pendente:'Pendente'}[d.status]||d.status;
      html += `<div class="report-item">
        <div class="ri-left"><div class="ri-name">${d.nome}</div><div class="ri-detail">${data.mesLabel(d)}</div></div>
        <div class="ri-right">
          <span class="ri-valor">${data.fmt(d.valor)}</span>
          <span class="ri-tag ${sc}">${sl}</span>
          <div style="font-size:11px;color:var(--muted)">Pago: ${data.fmt(d.pago)}</div>
        </div>
      </div>`;
    });
    html += `<div class="report-total-row">
      <span>Total: ${data.fmt(data.resumo.mensalidade_total)}</span>
      <span style="color:var(--accent)">Pago: ${data.fmt(data.resumo.mensalidade_pago)}</span>
      <span style="color:#e67e22">Pend.: ${data.fmt(Math.max(0,data.resumo.mensalidade_pendente))}</span>
    </div></div>`;
  }

  if(data.faxinas.length){
    html += `<div class="report-section"><h3>🧹 Faxina</h3>`;
    data.faxinas.forEach(d => {
      const pl = d.presenca==='feito'?'Feito':'Falta';
      const pc = d.presenca==='feito'?'feito':'falta';
      html += `<div class="report-item">
        <div class="ri-left"><div class="ri-name">${d.nome}</div><div class="ri-detail">${data.mesLabel(d)} · ${pl} · ${d.pagamento==='pago'?'Pago':'Não Pago'}</div></div>
        <div class="ri-right">
          ${d.presenca==='falta'?'<span class="ri-valor">'+data.fmt(d.valor)+'</span>':'<span style="color:var(--accent);font-size:13px">✔ Isento</span>'}
          <span class="ri-tag ${pc}">${pl}</span>
        </div>
      </div>`;
    });
    html += `<div class="report-total-row">
      <span style="color:#e74c3c">Cobrado por faltas: ${data.fmt(data.resumo.faxina_faltas)}</span>
    </div></div>`;
  }

  if(data.despesas.length){
    html += `<div class="report-section"><h3> Despesas (sua parte)</h3>`;
    data.despesas.forEach(d => {
      const sc = data.statusTagClass(d.status);
      html += `<div class="report-item">
        <div class="ri-left">
          <div class="ri-name">${d.item}</div>
          <div class="ri-detail">${data.mesLabel(d)} · Parc. ${d.parcela} · Dividido entre ${d.divisao}</div>
        </div>
        <div class="ri-right">
          <span class="ri-valor">${data.fmt(d.por_medium)}</span>
          <span class="ri-tag ${sc}">${data.statusLabel(d.status)}</span>
        </div>
      </div>`;
    });
    html += `<div class="report-total-row"><span>Total: ${data.fmt(data.resumo.despesas_total)}</span></div></div>`;
  }

  if(data.trabalhos.length){
    html += `<div class="report-section"><h3>⭐ Trabalhos (sua parte)</h3>`;
    data.trabalhos.forEach(d => {
      const sc = data.statusTagClass(d.status);
      html += `<div class="report-item">
        <div class="ri-left">
          <div class="ri-name">${d.entidade}</div>
          <div class="ri-detail">${data.mesLabel(d)} · Dividido entre ${d.divisao}</div>
        </div>
        <div class="ri-right">
          <span class="ri-valor">${data.fmt(d.por_medium)}</span>
          <span class="ri-tag ${sc}">${data.statusLabel(d.status)}</span>
        </div>
      </div>`;
    });
    html += `<div class="report-total-row"><span>Total: ${data.fmt(data.resumo.trabalhos_total)}</span></div></div>`;
  }

  const today = new Date().toLocaleDateString('pt-BR');
  html += `<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted)">Relatório gerado em ${today} · Mejepra Financeiro</div>`;

  document.getElementById('reportBody').innerHTML = html;
  document.getElementById('reportOverlay').classList.add('open');
}

function fecharRelatorio(){
  document.getElementById('reportOverlay').classList.remove('open');
  relatorioDataAtual = null;
}

// ============================================================
// PDF — window.print() captura APENAS o relatório
// ============================================================
function gerarPDF(){
  window.print();
}

// ============================================================
// WHATSAPP — usa EXATAMENTE os mesmos dados de gerarRelatorioData()
// ============================================================
function compartilharWhatsApp(){
  const data = relatorioDataAtual;
  if(!data) return;

  const span = document.querySelector(".period-bar .month");
  let texto = `📋 *Relatório (${span.textContent}) — ${data.medium.nome}*\n`;
  texto += `📊 ${data.medium.status}\n`;
  texto += `📞 ${data.medium.tel || '—'}\n📍 ${data.medium.endereco || '—'}\n`;

  if(data.mensalidades.length){
    texto += `\n*💰 Mensalidades*\n`;
    data.mensalidades.forEach(d => {
      const sl = {pago:'Pago',parcial:'Parcial',pendente:'Pendente'}[d.status]||d.status;
      texto += `• ${d.nome} (${data.mesLabel(d)}): ${data.fmt(d.valor)} — ${sl} (Pago: ${data.fmt(d.pago)})\n`;
    });
    texto += `→ Total: ${data.fmt(data.resumo.mensalidade_total)} | Pago: ${data.fmt(data.resumo.mensalidade_pago)} | Pend.: ${data.fmt(Math.max(0,data.resumo.mensalidade_pendente))}\n`;
  }

  if(data.faxinas.length){
    texto += `\n* Faxina*\n`;
    data.faxinas.forEach(d => {
      const pl = d.presenca==='feito'?'Feito':'Falta';
      const val = d.presenca==='falta' ? data.fmt(d.valor) : 'Isento';
      texto += `• ${d.nome} (${data.mesLabel(d)}): ${pl} — ${val}\n`;
    });
    texto += `→ Cobrado por faltas: ${data.fmt(data.resumo.faxina_faltas)}\n`;
  }

  if(data.despesas.length){
    texto += `\n*📋 Despesas*\n`;
    data.despesas.forEach(d => {
      texto += `• ${d.item} (${data.mesLabel(d)}): ${data.fmt(d.por_medium)} — ${data.statusLabel(d.status)}\n`;
    });
    texto += `→ Total: ${data.fmt(data.resumo.despesas_total)}\n`;
  }

  if(data.trabalhos.length){
    texto += `\n*⭐ Trabalhos*\n`;
    data.trabalhos.forEach(d => {
      texto += `• ${d.entidade} (${data.mesLabel(d)}): ${data.fmt(d.por_medium)} — ${data.statusLabel(d.status)}\n`;
    });
    texto += `→ Total: ${data.fmt(data.resumo.trabalhos_total)}\n`;
  }

  const today = new Date().toLocaleDateString('pt-BR');
  texto += `\n_${today} · Mejepra Financeiro_`;

  window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
}

function inicializarMes() {
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const d = new Date();
  span.textContent = meses[d.getMonth()] + " " + d.getFullYear();
}

function getMesAno(){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  return { mes: (meses.indexOf(partes[0])+1).toString().padStart(2,'0'), ano: partes[1] };
}

function navegarMes(dir){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  let mes = meses.indexOf(partes[0]), ano = parseInt(partes[1]);
  mes += dir;
  if(mes<0){ mes=11; ano--; } else if(mes>11){ mes=0; ano++; }
  span.textContent = meses[mes]+" "+ano;
  if (relatorioDataAtual && relatorioDataAtual.medium) {
    abrirRelatorio(relatorioDataAtual.medium.id);
  }
}

inicializarMes();
carregarMediuns();
</script>
