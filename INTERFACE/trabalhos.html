<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Trabalhos — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:120px auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 8px;font-size:13px;font-weight:600;color:var(--fg)}
.header{display:flex;align-items:center;gap:12px;padding:6px 16px 14px}
.header .back{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:20px;font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}
.period-bar{display:flex;justify-content:space-between;align-items:center;padding:0 16px 12px}
.period-bar .month{font-size:17px;font-weight:700;font-family:var(--font-display)}
.period-bar .nav-arrows{display:flex;gap:4px}
.period-bar .nav-arrows button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.period-bar .nav-arrows button:active{background:var(--border)}
.period-total{display:flex;gap:12px;padding:0 16px 14px}
.period-total .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.period-total .stat-card .label{font-size:12px;color:var(--muted);font-weight:500}
.period-total .stat-card .value{font-size:18px;font-weight:700;margin-top:4px;font-family:var(--font-display)}
.period-total .stat-card .value.total{color:var(--fg)}
.period-total .stat-card .value.realizado{color:var(--accent)}
.period-total .stat-card .value.pendente{color:#e67e22}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:0 16px 12px;padding:14px 16px 16px}
.add-form label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.add-form input,.add-form select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font-body);background:var(--surface);color:var(--fg);outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
.add-form input:focus,.add-form select:focus{border-color:var(--accent)}
.add-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.add-form .form-field{margin-top:8px}
.add-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;font-family:var(--font-display);cursor:pointer;transition:all .2s;margin-top:10px}
.add-btn:active{transform:scale(.97);opacity:.9}
.divisao-btn{width:100%;padding:12px;border:1.5px dashed var(--accent);border-radius:10px;background:var(--accent-light);color:var(--accent);font-size:14px;font-weight:600;font-family:var(--font-display);cursor:pointer;transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.divisao-btn:active{transform:scale(.97)}
.divisao-btn.has-selection{border-style:solid;background:var(--accent);color:#fff}
.table-wrap{flex:1;overflow-x:auto;padding:0 16px 16px}
table{width:100%;border-collapse:separate;border-spacing:0 4px;min-width:380px}
thead th{text-align:left;font-size:12px;font-weight:600;color:var(--muted);padding:6px 12px;text-transform:uppercase;letter-spacing:.5px}
thead th:first-child{padding-left:0}
tbody tr{background:var(--surface);border-radius:var(--radius);cursor:pointer;transition:all .1s}
tbody tr:active{opacity:.7}
tbody td{padding:12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:14px;white-space:nowrap}
tbody td:first-child{border-left:1px solid var(--border);border-radius:var(--radius) 0 0 var(--radius);padding-left:14px;font-weight:600;font-family:var(--font-display)}
tbody td:last-child{border-right:1px solid var(--border);border-radius:0 var(--radius) var(--radius) 0;padding-right:14px}
.value{font-weight:700;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag.realizado{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.tag.pendente{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}
.tag.futuro{background:color-mix(in srgb,#3498db 15%,transparent);color:#3498db}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;display:none;opacity:0;transition:opacity .25s}
.overlay.open{display:block;opacity:1}
.edit-sheet{position:fixed;bottom:0;left:0;right:0;z-index:91;background:var(--surface);border-radius:18px 18px 0 0;padding:16px 20px 28px;box-shadow:0 -4px 30px rgba(0,0,0,.12);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-width:430px;margin:0 auto}
.edit-sheet.open{transform:translateY(0)}
.edit-sheet .sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.edit-sheet .sheet-title{font-size:18px;font-weight:700;font-family:var(--font-display);margin-bottom:16px}
.edit-sheet label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:8px}
.edit-sheet input,.edit-sheet select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font-body);background:var(--surface);color:var(--fg);outline:none;transition:border .2s}
.edit-sheet input:focus,.edit-sheet select:focus{border-color:var(--accent)}
.edit-sheet .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-actions{display:flex;gap:10px;margin-top:18px}
.sheet-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font-display);cursor:pointer;transition:all .2s}
.sheet-actions button:active{transform:scale(.97)}
.btn-save{background:var(--accent);color:#fff}
.btn-delete{background:#fee2e2;color:#dc2626;border:1.5px solid #fecaca}
.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;background:none;border:none;font-family:var(--font-body)}
.nav-item svg{width:24px;height:24px}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}

/* Medium selection sheet */
.medium-list{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.medium-check{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;transition:all .15s}
.medium-check:active{background:var(--accent-light)}
.medium-check.selected{background:var(--accent-light);border:1.5px solid var(--accent)}
.medium-check .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:14px;flex-shrink:0}
.medium-check.selected .avatar{background:var(--accent);color:#fff}
.medium-check .m-name{font-size:15px;font-weight:600;font-family:var(--font-display)}
.medium-check .check-icon{margin-left:auto;width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s}
.medium-check.selected .check-icon{background:var(--accent);border-color:var(--accent)}
.medium-check.selected .check-icon svg{opacity:1}
.medium-check .check-icon svg{width:14px;height:14px;color:#fff;opacity:0;transition:opacity .15s}
.divisao-preview-bar{background:var(--accent-light);border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:12px}
.select-all-btn{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font-body);margin-bottom:10px;transition:all .15s}
.select-all-btn:active{background:var(--accent-light);color:var(--accent)}
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">10:28</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><rect x="12" y="3" width="3.5" height="6" rx="0.8" fill="currentColor"/><rect x="2.5" y="4" width="6" height="4" rx="0.5" fill="currentColor" opacity="0.85"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:2px"><path d="M8 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5 5c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
  </div>
</div>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Trabalhos</h1>
</div>

<div class="period-bar">
  <span class="month">Maio 2026</span>
  <div class="nav-arrows">
    <button onclick="navegarMes(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button onclick="navegarMes(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<div class="period-total">
  <div class="stat-card">
    <div class="label">Total Mês</div>
    <div class="value total" id="totalTotal">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Realizado</div>
    <div class="value realizado" id="totalRealizado">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Pendente</div>
    <div class="value pendente" id="totalPendente">R$ 0</div>
  </div>
</div>

<div class="add-form">
  <label>Novo trabalho</label>
  <div class="form-field">
    <input id="f-entidade" type="text" placeholder="Nome da entidade">
  </div>
  <div class="form-row">
    <div class="form-field">
      <input id="f-valor" type="number" step="0.01" placeholder="Valor (R$)">
    </div>
    <div class="form-field">
      <select id="f-status">
        <option value="realizado">Realizado</option>
        <option value="pendente">Pendente</option>
        <option value="futuro">Futuro</option>
      </select>
    </div>
  </div>
  <button class="divisao-btn" id="btnDivisao" onclick="abrirDivisaoSheet()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="7" r="3"/><path d="M3 21c1.5-2.5 4-4 7-4s5.5 1.5 7 4"/><path d="M17 5.5a3 3 0 1 1 0 5"/></svg>
    <span>Dividir por médiuns</span>
  </button>
  <div id="divisao-preview" style="display:none;background:var(--accent-light);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:14px;font-weight:600;color:var(--accent);text-align:center"></div>
  <button class="add-btn" onclick="addTrabalho()">Adicionar Trabalho</button>
</div>

<div class="table-wrap">
<table>
<thead><tr><th>Entidade</th><th>Valor</th><th>Por Médium</th><th>Status</th></tr></thead>
<tbody id="trabalhos-tbody"></tbody>
</table>
</div>

<div class="overlay" id="edit-overlay" onclick="fecharSheet()"></div>
<div class="edit-sheet" id="edit-sheet">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">Editar trabalho</h2>
  <label>Entidade</label>
  <input id="e-entidade" type="text" placeholder="Nome da entidade">
  <div class="form-row">
    <div class="form-field">
      <label>Valor (R$)</label>
      <input id="e-valor" type="number" step="0.01" placeholder="Valor">
    </div>
    <div class="form-field">
      <label>Dividir por (médiuns)</label>
      <input id="e-divisao" type="number" min="1" step="1" placeholder="Nº de médiuns">
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label>Status</label>
      <select id="e-status">
        <option value="realizado">Realizado</option>
        <option value="pendente">Pendente</option>
        <option value="futuro">Futuro</option>
      </select>
    </div>
    <div class="form-field"></div>
  </div>
  <div class="sheet-actions">
    <button class="btn-save" onclick="salvarEdicao()">Salvar</button>
    <button class="btn-delete" onclick="excluirTrabalho()">Excluir</button>
  </div>
</div>

<!-- Medium selection overlay -->
<div class="overlay" id="div-overlay" onclick="fecharDivisaoSheet()"></div>
<div class="edit-sheet" id="div-sheet" style="z-index:95">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">Selecionar médiuns</h2>
  <button class="select-all-btn" id="btnSelectAll" onclick="toggleSelectAll()">Selecionar todos</button>
  <div class="medium-list" id="mediumList"></div>
  <div class="divisao-preview-bar" id="divPreviewBar" style="display:none"></div>
  <div class="sheet-actions">
    <button class="btn-save" onclick="confirmarDivisao()">Confirmar</button>
    <button class="btn-delete" style="background:var(--bg);color:var(--muted);border:1.5px solid var(--border)" onclick="fecharDivisaoSheet()">Cancelar</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
let editRow=null;
let mediunsAtivos = [];
let selectedMediums = [];
let tempSelected = [];

async function carregarMediuns(){
  try {
    const res = await fetch(`${API}/mediuns`);
    mediunsAtivos = (await res.json()).filter(m => m.status === 'Ativo');
  } catch(e) { console.error('Erro:', e); }
}

function abrirSheet(row){
  editRow=row;
  document.getElementById('e-entidade').value=row.dataset.entidade;
  document.getElementById('e-valor').value=row.dataset.valor;
  document.getElementById('e-divisao').value=row.dataset.divisao;
  const tag=row.querySelector('.tag');
  const statusMap={realizado:'realizado',pendente:'pendente',futuro:'futuro'};
  document.getElementById('e-status').value=statusMap[tag.className.replace('tag ','')]||'realizado';
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-sheet').classList.add('open');
}
function fecharSheet(){
  document.getElementById('edit-overlay').classList.remove('open');
  document.getElementById('edit-sheet').classList.remove('open');
  editRow=null;
}
async function salvarEdicao(){
  if(!editRow) return;
  const entidade=document.getElementById('e-entidade').value.trim();
  const valor=parseFloat(document.getElementById('e-valor').value)||0;
  const divisao=parseInt(document.getElementById('e-divisao').value)||1;
  const status=document.getElementById('e-status').value;
  if(!entidade||!valor){alert('Preencha a entidade e o valor.');return}
  const mA = getMesAno();
  try {
    const id = parseInt(editRow.dataset.id);
    await fetch(`${API}/trabalhos/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entidade, valor, mes: mA.mes, ano: mA.ano, divisao, status }) });
    editRow.dataset.entidade=entidade;
    editRow.dataset.valor=valor;
    editRow.dataset.divisao=divisao;
    editRow.dataset.status=status;
    const cells=editRow.querySelectorAll('td');
    cells[0].textContent=entidade;
    cells[1].textContent='R$ '+valor.toFixed(2).replace('.',',');
    var porMed=divisao>0?valor/divisao:valor;
    cells[2].textContent='R$ '+porMed.toFixed(2).replace('.',',');
    const tag=editRow.querySelector('.tag');
    tag.textContent=status.charAt(0).toUpperCase()+status.slice(1);
    tag.className='tag '+status;
    atualizarTotais();
  } catch(e) { console.error('Erro:', e); alert('Erro ao salvar'); }
  fecharSheet();
}
async function excluirTrabalho(){
  if(!editRow||!confirm('Excluir este trabalho?'))return;
  try {
    const id = parseInt(editRow.dataset.id);
    await fetch(`${API}/trabalhos/${id}`, { method: 'DELETE' });
    editRow.remove();
    atualizarTotais();
  } catch(e) { console.error('Erro:', e); }
  fecharSheet();
}
async function carregarTrabalhos(){
  const mA = getMesAno();
  try {
    const res = await fetch(`${API}/trabalhos?mes=${mA.mes}&ano=${mA.ano}`);
    const trabalhos = await res.json();
    const tbody = document.getElementById('trabalhos-tbody');
    tbody.innerHTML = '';
    trabalhos.forEach(t => {
      const porMed = t.divisao > 0 ? t.valor / t.divisao : t.valor;
      const tr = document.createElement('tr');
      tr.dataset.id = String(t.id);
      tr.dataset.entidade = t.entidade;
      tr.dataset.valor = String(t.valor);
      tr.dataset.mes = t.mes || '';
      tr.dataset.divisao = String(t.divisao);
      tr.dataset.status = t.status;
      const statusLabel = t.status.charAt(0).toUpperCase() + t.status.slice(1);
      tr.innerHTML = `<td>${t.entidade}</td><td class="value">R$ ${t.valor.toFixed(2).replace('.',',')}</td><td class="value">R$ ${porMed.toFixed(2).replace('.',',')}</td><td><span class="tag ${t.status}">${statusLabel}</span></td>`;
      tbody.appendChild(tr);
    });
    tbody.addEventListener('click', function(e){
      const tr = e.target.closest('tr');
      if(tr) abrirSheet(tr);
    });
    atualizarTotais();
  } catch(e) { console.error('Erro ao carregar:', e); }
}

function abrirDivisaoSheet(){
  tempSelected = [...selectedMediums];
  renderMediumList();
  document.getElementById('div-overlay').classList.add('open');
  document.getElementById('div-sheet').classList.add('open');
}
function fecharDivisaoSheet(){
  document.getElementById('div-overlay').classList.remove('open');
  document.getElementById('div-sheet').classList.remove('open');
}
function renderMediumList(){
  const list = document.getElementById('mediumList');
  list.innerHTML = mediunsAtivos.map(m => {
    const sel = tempSelected.includes(m.id);
    return `<div class="medium-check ${sel?'selected':''}" onclick="toggleMedium(${m.id})">
      <div class="avatar">${m.iniciais}</div>
      <div class="m-name">${m.nome}</div>
      <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    </div>`;
  }).join('');
  updateDivPreview();
}
function toggleMedium(id){
  const idx = tempSelected.indexOf(id);
  if(idx === -1) tempSelected.push(id);
  else tempSelected.splice(idx, 1);
  renderMediumList();
}
function toggleSelectAll(){
  if(tempSelected.length === mediunsAtivos.length){
    tempSelected = [];
  } else {
    tempSelected = mediunsAtivos.map(m => m.id);
  }
  renderMediumList();
}
function updateDivPreview(){
  const bar = document.getElementById('divPreviewBar');
  const valor = parseFloat(document.getElementById('f-valor').value)||0;
  if(tempSelected.length > 0 && valor > 0){
    const porMed = valor / tempSelected.length;
    bar.style.display = 'block';
    bar.innerHTML = tempSelected.length+' médium'+(tempSelected.length>1?'s':'')+' &rarr; <strong>R$ '+porMed.toFixed(2).replace('.',',')+' cada</strong>';
  } else {
    bar.style.display = 'none';
  }
}
function confirmarDivisao(){
  selectedMediums = [...tempSelected];
  fecharDivisaoSheet();
  const btn = document.getElementById('btnDivisao');
  if(selectedMediums.length > 0){
    btn.classList.add('has-selection');
    btn.querySelector('span').textContent = selectedMediums.length+' médium'+(selectedMediums.length>1?'s':'')+' selecionado'+(selectedMediums.length>1?'s':'');
  } else {
    btn.classList.remove('has-selection');
    btn.querySelector('span').textContent = 'Dividir por médiuns';
  }
  atualizarPreview();
}

function atualizarPreview(){
  const valor = parseFloat(document.getElementById('f-valor').value)||0;
  const divisao = selectedMediums.length || 0;
  const preview = document.getElementById('divisao-preview');
  if(divisao>0 && valor>0){
    const porMed = valor/divisao;
    preview.style.display='block';
    preview.innerHTML= divisao+' médium'+(divisao>1?'s':'')+' &rarr; <strong>R$ '+porMed.toFixed(2).replace('.',',')+' cada</strong>';
  } else {
    preview.style.display='none';
  }
}
document.getElementById('f-valor').addEventListener('input', atualizarPreview);

async function addTrabalho(){
  const entidade=document.getElementById('f-entidade').value.trim();
  const valor=parseFloat(document.getElementById('f-valor').value)||0;
  const divisao=selectedMediums.length || 1;
  const status=document.getElementById('f-status').value;
  if(!entidade||!valor){alert('Preencha a entidade e o valor.');return}
  const mA = getMesAno();
  try {
    const res = await fetch(`${API}/trabalhos`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entidade, valor, mes: mA.mes, ano: mA.ano, divisao, status }) });
    const t = await res.json();
    var porMed=divisao>0?valor/divisao:valor;
    const tr=document.createElement('tr');
    tr.dataset.id = String(t.id);
    tr.dataset.entidade=entidade;
    tr.dataset.valor=String(valor);
    tr.dataset.mes='';
    tr.dataset.divisao=String(divisao);
    tr.dataset.status=status;
    const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
    tr.innerHTML='<td>'+entidade+'</td><td class="value">R$ '+valor.toFixed(2).replace('.',',')+'</td><td class="value">R$ '+porMed.toFixed(2).replace('.',',')+'</td><td><span class="tag '+status+'>'+statusLabel+'</span></td>';
    document.getElementById('trabalhos-tbody').appendChild(tr);
    document.getElementById('f-entidade').value='';
    document.getElementById('f-valor').value='';
    document.getElementById('divisao-preview').style.display='none';
    selectedMediums = [];
    const btn = document.getElementById('btnDivisao');
    btn.classList.remove('has-selection');
    btn.querySelector('span').textContent = 'Dividir por médiuns';
    atualizarTotais();
  } catch(e) { console.error('Erro:', e); alert('Erro ao adicionar'); }
}
function atualizarTotais(){
  const rows=document.querySelectorAll('#trabalhos-tbody tr');
  let total=0, realizado=0, pendente=0;
  rows.forEach(r=>{
    const txt=r.querySelectorAll('td')[1].textContent.replace('R$ ','').replace(',','.');
    const val=parseFloat(txt)||0;
    total+=val;
    const tag=r.querySelector('.tag');
    if(tag){
      if(tag.classList.contains('realizado')) realizado+=val;
      else { pendente+=val; }
    }
  });
  const els=document.querySelectorAll('.period-total .value');
  if(els.length>=3){
    els[0].textContent='R$ '+total.toFixed(2).replace('.',',');
    els[1].textContent='R$ '+realizado.toFixed(2).replace('.',',');
    els[2].textContent='R$ '+pendente.toFixed(2).replace('.',',');
  }
}

function getMesAno(){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  return { mes: (meses.indexOf(partes[0])+1).toString().padStart(2,'0'), ano: partes[1] };
}
function navegarMes(dir){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  let mes = meses.indexOf(partes[0]), ano = parseInt(partes[1]);
  mes += dir;
  if(mes<0){ mes=11; ano--; } else if(mes>11){ mes=0; ano++; }
  span.textContent = meses[mes]+" "+ano;
  carregarTrabalhos();
}
carregarMediuns();
carregarTrabalhos();
</script>
