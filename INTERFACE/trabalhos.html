<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2a7a5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mejepra">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo.png">
<title>Trabalhos — Mejepra</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(98% 0.004 240);
  --surface:oklch(100% 0 0);
  --fg:oklch(20% 0.02 240);
  --muted:oklch(50% 0.018 240);
  --border:oklch(90% 0.006 240);
  --accent:oklch(56% 0.12 170);
  --accent-light:oklch(90% 0.06 170);
  --radius:14px;
  --font-display:'Söhne','Avenir Next',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:100%;margin:0 auto;min-height:100dvh;padding:0 clamp(12px,3vw,40px)}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url('logo.png');background-size:clamp(80px,10vw,120px) auto;background-repeat:space;background-position:center;opacity:.035;pointer-events:none}
body>*{position:relative;z-index:1}

.header{display:flex;align-items:center;gap:clamp(8px,2vw,12px);padding:6px 0 14px}
.header .back{width:clamp(36px,5vw,40px);height:clamp(36px,5vw,40px);border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg)}
.header .back:active{background:var(--border);transform:scale(.93)}
.header h1{font-size:clamp(18px,2.5vw,20px);font-weight:700;font-family:var(--font-display);letter-spacing:-0.3px}

.period-bar{display:flex;justify-content:space-between;align-items:center;padding:0 0 12px}
.period-bar .month{font-size:clamp(16px,2vw,17px);font-weight:700;font-family:var(--font-display)}
.period-bar .nav-arrows{display:flex;gap:4px}
.period-bar .nav-arrows button{width:clamp(32px,4vw,36px);height:clamp(32px,4vw,36px);border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg);transition:all .1s}
.period-bar .nav-arrows button:active{background:var(--border)}

.add-trabalho-bar{padding:0 0 12px}
.add-trabalho-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(10px,2vw,12px) clamp(12px,2vw,14px);max-width:1200px}
.add-trabalho-input label{display:block;font-size:clamp(11px,1.3vw,12px);color:var(--muted);font-weight:600;margin-bottom:6px}
.add-trabalho-input .input-row{display:flex;gap:clamp(6px,1.5vw,8px)}
.add-trabalho-input .input-row input{flex:1;padding:clamp(8px,1.5vw,10px) clamp(10px,1.5vw,12px);border:1.5px solid var(--border);border-radius:10px;font-size:clamp(14px,1.8vw,16px);font-family:var(--font-body);color:var(--fg);outline:none;background:var(--bg)}
.add-trabalho-input .input-row input:focus{border-color:var(--accent)}
.add-trabalho-input .input-row button{white-space:nowrap;padding:clamp(8px,1.5vw,10px) clamp(12px,2vw,14px);border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:clamp(12px,1.5vw,13px);font-weight:700;cursor:pointer;font-family:var(--font-display);transition:all .15s}
.add-trabalho-input .input-row button:active{transform:scale(.95)}

.period-total{display:flex;gap:clamp(8px,2vw,12px);padding:0 0 14px}
.period-total .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(10px,2vw,12px);text-align:center}
.period-total .stat-card .label{font-size:clamp(11px,1.5vw,12px);color:var(--muted);font-weight:500}
.period-total .stat-card .value{font-size:clamp(16px,2vw,18px);font-weight:700;margin-top:4px;font-family:var(--font-display)}
.period-total .stat-card .value.total{color:var(--fg)}
.period-total .stat-card .value.pago{color:var(--accent)}
.period-total .stat-card .value.pendente{color:#e67e22}

.list{flex:1;overflow-y:auto;padding:0 0 80px;display:flex;flex-direction:column;gap:clamp(8px,1.5vw,10px)}

/* Accordion card */
.trab-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.trab-card.expanded{border-color:var(--accent);box-shadow:0 2px 12px rgba(42,122,90,.08)}
.trab-header{display:flex;align-items:center;gap:clamp(10px,2vw,12px);padding:clamp(12px,2vw,14px) clamp(14px,2vw,16px);cursor:pointer;transition:all .1s;user-select:none}
.trab-header:active{background:var(--accent-light)}
.trab-header .t-icon{width:clamp(36px,5vw,40px);height:clamp(36px,5vw,40px);border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;transition:all .2s}
.trab-card.expanded .trab-header .t-icon{background:var(--accent);color:#fff}
.trab-header .t-icon svg{width:clamp(18px,2.5vw,20px);height:clamp(18px,2.5vw,20px)}
.trab-header .t-info{flex:1;min-width:0}
.trab-header .t-name{font-size:clamp(15px,2vw,17px);font-weight:700;font-family:var(--font-display)}
.trab-header .t-stats{display:flex;gap:clamp(8px,2vw,12px);margin-top:3px;font-size:clamp(11px,1.4vw,12px)}
.trab-header .t-stats .ts{display:flex;align-items:center;gap:4px}
.trab-header .t-stats .ts .ts-label{color:var(--muted)}
.trab-header .t-stats .ts .ts-val{font-weight:700;font-variant-numeric:tabular-nums}
.trab-header .t-stats .ts .ts-val.accent{color:var(--accent)}
.trab-header .t-stats .ts .ts-val.pend{color:#e67e22}
.trab-header .chevron{width:clamp(20px,2.5vw,22px);height:clamp(20px,2.5vw,22px);color:var(--muted);transition:transform .25s cubic-bezier(.32,.72,0,1);flex-shrink:0}
.trab-card.expanded .trab-header .chevron{transform:rotate(180deg);color:var(--accent)}

.trab-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.32,.72,0,1)}
.trab-card.expanded .trab-body{max-height:2000px}
.trab-body-inner{padding:0 clamp(14px,2vw,16px) clamp(12px,2vw,14px);border-top:1px solid var(--border)}

/* Medium row inside expanded card */
.med-row{display:flex;align-items:center;gap:clamp(8px,1.5vw,10px);padding:clamp(8px,1.5vw,10px) 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .1s}
.med-row:last-child{border-bottom:none}
.med-row:active{opacity:.7}
.med-row .m-avatar{width:clamp(30px,4vw,34px);height:clamp(30px,4vw,34px);border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:clamp(11px,1.4vw,13px);flex-shrink:0}
.med-row .m-info{flex:1;min-width:0}
.med-row .m-name{font-size:clamp(13px,1.6vw,14px);font-weight:600;font-family:var(--font-display)}
.med-row .m-val{font-size:clamp(12px,1.4vw,13px);color:var(--muted);margin-top:1px}
.med-row .m-val strong{color:var(--fg);font-weight:700}
.med-row .m-tag{padding:clamp(2px,0.5vw,3px) clamp(8px,1.2vw,10px);border-radius:20px;font-size:clamp(10px,1.2vw,11px);font-weight:600}
.med-row .m-tag.pago{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.med-row .m-tag.pendente{background:color-mix(in srgb,#e67e22 15%,transparent);color:#e67e22}

.bottom-nav{display:flex;justify-content:space-around;align-items:center;padding:8px 0 16px;border-top:1px solid var(--border);background:var(--surface)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:clamp(10px,1.2vw,10px);font-weight:500;background:none;border:none;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.nav-item svg{width:clamp(20px,3vw,24px);height:clamp(20px,3vw,24px)}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{color:var(--accent)}

/* Sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:10}
.sheet{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:clamp(20px,3vw,24px) clamp(16px,3vw,20px) clamp(24px,4vw,32px);z-index:11;box-shadow:0 -4px 30px rgba(0,0,0,0.1);max-width:600px;margin:0 auto}
.sheet.open,.overlay.open{display:block}
.sheet .handle{width:36px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 16px}
.sheet h2{font-size:clamp(16px,2vw,18px);font-weight:700;font-family:var(--font-display);margin-bottom:16px;text-align:center}
.sheet .field{margin-bottom:clamp(12px,2vw,14px)}
.sheet .field label{display:block;font-size:clamp(12px,1.5vw,13px);font-weight:600;color:var(--muted);margin-bottom:4px}
.sheet .field input,.sheet .field select{width:100%;padding:clamp(12px,2vw,14px);border:1.5px solid var(--border);border-radius:12px;font-size:clamp(14px,1.8vw,16px);font-family:var(--font-body);color:var(--fg);outline:none;transition:border .2s;background:var(--bg)}
.sheet .field input:focus,.sheet .field select:focus{border-color:var(--accent)}
.sheet select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px;-webkit-appearance:none;appearance:none}
.sheet .status-options{display:flex;gap:clamp(6px,1.5vw,8px);margin-bottom:clamp(16px,2.5vw,20px)}
.sheet .status-options button{flex:1;padding:clamp(8px,1.5vw,10px);border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:clamp(12px,1.5vw,13px);font-weight:600;cursor:pointer;font-family:var(--font-body);color:var(--muted);transition:all .15s}
.sheet .status-options button.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.sheet .btn-salvar{width:100%;padding:clamp(12px,2vw,14px);border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:clamp(14px,2vw,16px);font-weight:700;cursor:pointer;font-family:var(--font-display);transition:all .15s}
.sheet .btn-salvar:active{transform:scale(.97)}
.sheet .btn-excluir{width:100%;padding:clamp(10px,1.5vw,12px);border:none;border-radius:12px;background:transparent;color:#e74c3c;font-size:clamp(13px,1.8vw,14px);font-weight:600;cursor:pointer;font-family:var(--font-body);margin-top:8px}

.trabalho-info{padding:clamp(10px,1.5vw,12px);background:var(--bg);border-radius:10px;margin-bottom:clamp(12px,2vw,14px)}
.trabalho-info .t-row{display:flex;justify-content:space-between;font-size:clamp(13px,1.6vw,14px);padding:3px 0}
.trabalho-info .t-row .t-label{color:var(--muted)}
.trabalho-info .t-row .t-val{font-weight:700}
</style>
</head>
<body>

<div class="header">
  <button class="back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Trabalhos</h1>
</div>

<div class="period-bar">
  <span class="month">Maio 2026</span>
  <div class="nav-arrows">
    <button onclick="navegarMes(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button onclick="navegarMes(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<div class="add-trabalho-bar">
  <div class="add-trabalho-input">
    <label>Novo trabalho</label>
    <div class="input-row">
      <input type="text" id="inputEntidade" placeholder="Nome da entidade">
      <input type="number" id="inputValor" placeholder="Valor (R$)" step="0.01" min="0" style="max-width:140px">
      <button onclick="addTrabalho()">Adicionar</button>
    </div>
  </div>
</div>

<div class="period-total" id="totalCard">
  <div class="stat-card">
    <div class="label">Total Mês</div>
    <div class="value total" id="totalMes">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Pago</div>
    <div class="value pago" id="totalPago">R$ 0</div>
  </div>
  <div class="stat-card">
    <div class="label">Pendente</div>
    <div class="value pendente" id="totalPendente">R$ 0</div>
  </div>
</div>

<div class="list" id="listaTrabalhos"></div>

<div class="overlay" id="overlay" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h2 id="sheetTitle">Editar pagamento</h2>

  <div class="field">
    <label>Médium</label>
    <div id="sheetNome" style="padding:clamp(12px,2vw,14px);background:var(--bg);border-radius:12px;font-size:clamp(14px,1.8vw,16px);font-weight:600;color:var(--fg)"></div>
  </div>

  <div class="trabalho-info" id="trabalhoInfo"></div>

  <div class="status-options">
    <button class="selected" data-status="pago" onclick="selecionarStatus(this)">Pago</button>
    <button data-status="pendente" onclick="selecionarStatus(this)">Pendente</button>
  </div>

  <button class="btn-salvar" onclick="salvarStatus()">Salvar</button>
  <button class="btn-excluir" onclick="excluirTrabalho()">Excluir Trabalho</button>
</div>

<div class="bottom-nav">
  <button class="nav-item active" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 12l9-9 9 9v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Início</span>
  </button>
</div>

<script>
const API = '/api';
function getMesAno(){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  return { mes: (meses.indexOf(partes[0])+1).toString().padStart(2,'0'), ano: partes[1] };
}
let mediunsAtivos = [];
let trabalhos = [];
let dados = [];
let editingTrabalhoId = null;
let editingMediumId = null;
let statusAtual = "pendente";
let expandedCards = {};

async function carregarDados(){
  const mA = getMesAno();
  try {
    const [resMediuns, resTrabalhos] = await Promise.all([
      fetch(`${API}/mediuns`),
      fetch(`${API}/trabalhos?mes=${mA.mes}&ano=${mA.ano}`)
    ]);
    mediunsAtivos = (await resMediuns.json()).filter(m => m.status === 'Ativo');
    trabalhos = await resTrabalhos.json();
    renderizar();
  } catch(e) { console.error('Erro:', e); dados = []; renderizar(); }
}

function fmt(v){ return 'R$ '+v.toFixed(2).replace('.',','); }

function renderizar(){
  const lista = document.getElementById("listaTrabalhos");
  lista.innerHTML = "";
  let totalMes = 0, totalPago = 0, totalPendente = 0;

  if(trabalhos.length === 0){
    lista.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px">Nenhum trabalho neste mês</div>';
    atualizarCards(totalMes, totalPago, totalPendente);
    return;
  }

  trabalhos.forEach(trab => {
    const valorPorMed = trab.valor;
    const pagamentos = trab.pagamentos || {};
    const pagosCount = Object.values(pagamentos).filter(Boolean).length;
    const pendentesCount = trab.divisao - pagosCount;
    const totalTrab = valorPorMed * trab.divisao;
    const pagoTrab = valorPorMed * pagosCount;
    const pendenteTrab = valorPorMed * pendentesCount;

    totalMes += totalTrab;
    totalPago += pagoTrab;
    totalPendente += pendenteTrab;

    const isExpanded = expandedCards[trab.id] || false;

    const card = document.createElement("div");
    card.className = "trab-card" + (isExpanded ? " expanded" : "");
    card.dataset.id = trab.id;

    let bodyHtml = '';
    if(isExpanded){
      bodyHtml = '<div class="trab-body-inner">';
      mediunsAtivos.forEach(med => {
        const isPago = pagamentos[med.id] === true;
        const statusLabel = isPago ? "Pago" : "Pendente";
        const statusClass = isPago ? "pago" : "pendente";
        const iniciais = med.iniciais || med.nome.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        bodyHtml += `
          <div class="med-row" onclick="abrirSheet(${trab.id}, ${med.id})">
            <div class="m-avatar">${iniciais}</div>
            <div class="m-info">
              <div class="m-name">${med.nome}</div>
              <div class="m-val">Valor: <strong>${fmt(valorPorMed)}</strong></div>
            </div>
            <span class="m-tag ${statusClass}">${statusLabel}</span>
          </div>`;
      });
      bodyHtml += '</div>';
    }

    card.innerHTML = `
      <div class="trab-header" onclick="toggleCard(${trab.id})">
        <div class="t-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
        </div>
        <div class="t-info">
          <div class="t-name">${trab.entidade}</div>
          <div class="t-stats">
            <span class="ts"><span class="ts-label">Total:</span> <span class="ts-val">${fmt(totalTrab)}</span></span>
            <span class="ts"><span class="ts-label">Pago:</span> <span class="ts-val accent">${fmt(pagoTrab)}</span></span>
            <span class="ts"><span class="ts-label">Pend:</span> <span class="ts-val pend">${fmt(pendenteTrab)}</span></span>
          </div>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="trab-body">${bodyHtml}</div>
    `;

    lista.appendChild(card);
  });

  atualizarCards(totalMes, totalPago, totalPendente);
}

function atualizarCards(totalMes, totalPago, totalPendente){
  document.getElementById("totalMes").textContent = fmt(totalMes);
  document.getElementById("totalPago").textContent = fmt(totalPago);
  document.getElementById("totalPendente").textContent = fmt(totalPendente);
}

function toggleCard(trabalhoId){
  expandedCards[trabalhoId] = !expandedCards[trabalhoId];
  renderizar();
}

function abrirSheet(trabalhoId, mediumId){
  const trab = trabalhos.find(t => t.id === trabalhoId);
  const med = mediunsAtivos.find(m => m.id === mediumId);
  if(!trab || !med) return;

  editingTrabalhoId = trabalhoId;
  editingMediumId = mediumId;

  document.getElementById("sheetTitle").textContent = "Editar pagamento";
  document.getElementById("sheetNome").textContent = med.nome;

  const valorPorMed = trab.valor;
  const pagamentos = trab.pagamentos || {};
  statusAtual = pagamentos[mediumId] === true ? "pago" : "pendente";

  document.getElementById("trabalhoInfo").innerHTML = `
    <div class="t-row"><span class="t-label">Entidade</span><span class="t-val">${trab.entidade}</span></div>
    <div class="t-row"><span class="t-label">Valor por médium</span><span class="t-val" style="color:var(--accent)">R$ ${valorPorMed.toFixed(2)}</span></div>
    <div class="t-row"><span class="t-label">Dividido entre</span><span class="t-val">${trab.divisao} médiuns</span></div>
    <div class="t-row"><span class="t-label">Total do trabalho</span><span class="t-val">R$ ${(valorPorMed * trab.divisao).toFixed(2)}</span></div>
  `;

  document.querySelectorAll(".status-options button").forEach(b => {
    b.classList.toggle("selected", b.dataset.status === statusAtual);
  });

  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

function fecharSheet(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  editingTrabalhoId = null;
  editingMediumId = null;
}

function selecionarStatus(el){
  document.querySelectorAll(".status-options button").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  statusAtual = el.dataset.status;
}

async function salvarStatus(){
  const trab = trabalhos.find(t => t.id === editingTrabalhoId);
  if(!trab) return;

  const mA = getMesAno();
  const pagamentos = trab.pagamentos || {};
  pagamentos[editingMediumId] = statusAtual === "pago";

  try {
    await fetch(`${API}/trabalhos/${editingTrabalhoId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        entidade: trab.entidade,
        valor: trab.valor,
        mes: mA.mes,
        ano: mA.ano,
        divisao: trab.divisao,
        pagamentos: pagamentos
      })
    });
    fecharSheet();
    carregarDados();
  } catch(e) { console.error('Erro:', e); alert('Erro ao salvar'); }
}

async function excluirTrabalho(){
  if(!editingTrabalhoId) return;
  if(!confirm("Excluir este trabalho? Todos os médiuns serão removidos.")) return;
  try {
    await fetch(`${API}/trabalhos/${editingTrabalhoId}`, { method: 'DELETE' });
    fecharSheet();
    carregarDados();
  } catch(e) { console.error('Erro:', e); alert('Erro ao excluir'); }
}

async function addTrabalho(){
  const entidade = document.getElementById("inputEntidade").value.trim();
  const valor = parseFloat(document.getElementById("inputValor").value) || 0;
  if(!entidade){ alert("Preencha o nome da entidade."); return; }
  if(valor <= 0){ alert("Preencha um valor válido."); return; }
  if(mediunsAtivos.length === 0){ alert("Não há médiuns cadastrados."); return; }

  const mA = getMesAno();
  const divisao = mediunsAtivos.length;

  try {
    await fetch(`${API}/trabalhos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entidade, valor, mes: mA.mes, ano: mA.ano, divisao })
    });
    document.getElementById("inputEntidade").value = "";
    document.getElementById("inputValor").value = "";
    carregarDados();
  } catch(e) { console.error('Erro:', e); alert('Erro ao adicionar'); }
}

function navegarMes(dir){
  const span = document.querySelector(".period-bar .month");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const partes = span.textContent.split(" ");
  let mes = meses.indexOf(partes[0]), ano = parseInt(partes[1]);
  mes += dir;
  if(mes<0){ mes=11; ano--; } else if(mes>11){ mes=0; ano++; }
  span.textContent = meses[mes]+" "+ano;
  carregarDados();
}

carregarDados();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      window.location.reload();
    }
  });
}
</script>
